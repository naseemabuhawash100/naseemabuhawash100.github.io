<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f2d5c"/>
  <title>معرض الصور - روضة طلائع المبدعين</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

  <!-- AOS Animations CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- GSAP for Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --navy: #0f2d5c;
      --navy-light: #1a4a8a;
      --gold: #f5a623;
      --gold-light: #fbbf24;
      --teal: #0e7490;
      --teal-light: #159db9;
      --coral: #ff6b6b;
      --mint: #4ecdc4;
      --lavender: #a78bfa;
      --purple: #9333ea;
      --light: #f0f6ff;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
      --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.25);
      --radius: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Tajawal', sans-serif;
      direction: rtl;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0f6ff 100%);
      color: var(--gray-800);
      overflow-x: hidden;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(226, 232, 240, 0.8);
      transition: var(--transition);
    }

    header.scrolled {
      background: rgba(255,255,255,0.95);
      box-shadow: var(--shadow-lg);
      border-bottom-color: var(--gold);
    }

    .header-inner {
      max-width: 1320px; margin: auto;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }

    .logo-area {
      display: flex; align-items: center; gap: 14px;
      text-decoration: none;
    }

    .logo-circle {
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 15px rgba(15,45,92,0.3);
      transition: var(--transition);
    }

    .logo-circle:hover {
      transform: rotate(10deg) scale(1.08);
    }

    .logo-text h1 {
      font-size: 18px; font-weight: 900; color: var(--navy);
      line-height: 1.3; margin-bottom: 2px;
    }

    .logo-text p { font-size: 12px; color: var(--gray-500); }

    nav ul {
      display: flex; gap: 6px; list-style: none; flex-wrap: wrap;
      padding: 8px 12px;
      background: var(--gray-100);
      border-radius: 99px;
    }

    nav a {
      display: block; padding: 10px 18px; border-radius: 99px;
      font-size: 14px; font-weight: 700; color: var(--gray-600);
      text-decoration: none; transition: var(--transition);
    }

    nav a:hover, nav a.active {
      color: var(--navy);
      background: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-back {
      background: linear-gradient(135deg, var(--gold), #f97316);
      color: white; border: none; border-radius: 99px;
      padding: 12px 26px; font-size: 14px; font-weight: 800;
      cursor: pointer; font-family: 'Tajawal', sans-serif;
      box-shadow: 0 4px 15px rgba(245,166,35,0.35);
      transition: var(--transition);
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }

    .btn-back:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(245,166,35,0.45);
    }

    /* ─── HERO ─── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 40%, var(--teal) 100%);
      color: white;
      padding: 100px 24px 120px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      z-index: -1;
    }

    .hero::after {
      content: ''; position: absolute;
      top: -30%; right: -10%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 60%);
      border-radius: 50%;
      z-index: -1;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .hero-inner {
      max-width: 1320px; margin: auto;
      text-align: center;
      position: relative; z-index: 1;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.35);
      color: var(--gold-light);
      padding: 8px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 800;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
    }

    .hero h2 {
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 900; line-height: 1.2;
      margin-bottom: 20px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .hero p {
      font-size: 17px; opacity: 0.95; line-height: 1.9;
      max-width: 600px; margin: auto;
    }

    .wave {
      height: 80px;
      background: linear-gradient(180deg, #f0f6ff 0%, #e0f2fe 100%);
      clip-path: ellipse(55% 100% at 50% 100%);
      margin-top: -1px;
    }

    /* ─── GALLERY SECTION ─── */
    .gallery-section {
      padding: 80px 24px;
    }

    .section-title {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-title h2 {
      font-size: clamp(32px, 4vw, 44px);
      font-weight: 900; color: var(--navy);
      margin-bottom: 16px;
    }

    .section-title p {
      color: var(--gray-500); font-size: 17px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      max-width: 1320px;
      margin: 0 auto;
    }

    .gallery-card {
      background: white;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
    }

    .gallery-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.3) 100%);
      z-index: 1;
      opacity: 0;
      transition: var(--transition);
    }

    .gallery-card:hover::before {
      opacity: 1;
    }

    .gallery-card:hover {
      transform: translateY(-12px);
      box-shadow: var(--shadow-xl);
    }

    .gallery-img {
      width: 100%; height: 240px;
      background-size: cover;
      background-position: center;
      transition: transform 0.5s ease;
    }

    .gallery-card:hover .gallery-img {
      transform: scale(1.1);
    }

    .gallery-info {
      padding: 24px;
      position: relative;
      z-index: 2;
      background: white;
    }

    .gallery-info h3 {
      font-size: 18px; font-weight: 800; color: var(--navy);
      margin-bottom: 8px;
    }

    .gallery-info p {
      font-size: 14px; color: var(--gray-500); line-height: 1.8;
    }

    .gallery-date {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ─── LIGHTBOX MODAL ─── */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .lightbox.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .lightbox-img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border-radius: 12px;
    }

    .lightbox-caption {
      color: white;
      margin-top: 20px;
      font-size: 16px;
      text-align: center;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      transition: var(--transition);
    }

    .lightbox-close:hover { transform: scale(1.1); }

    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 50px;
      color: white;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .lightbox-prev { right: 20px; }
    .lightbox-next { left: 20px; }

    .lightbox-prev:hover, .lightbox-next:hover {
      background: rgba(0,0,0,0.8);
      transform: scale(1.1);
    }

    /* ─── LOADING ─── */
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-100);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      text-align: center;
      padding: 60px;
      color: var(--gray-500);
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--gray-500);
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* ─── TOAST ─── */
    .toast-container {
      position: fixed;
      top: 100px;
      left: 24px;
      z-index: 10001;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      background: white;
      border-radius: 16px;
      padding: 18px 22px;
      box-shadow: var(--shadow-xl);
      border-right: 4px solid var(--navy);
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 320px;
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toast.success { border-right-color: var(--mint); }
    .toast.error { border-right-color: var(--coral); }

    .toast-icon { font-size: 22px; }
    .toast-message { font-size: 14px; font-weight: 700; color: var(--gray-800); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ─── FOOTER ─── */
    footer {
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      color: rgba(255,255,255,0.8);
      padding: 50px 24px;
      text-align: center;
      font-size: 14px;
    }

    footer span { color: var(--gold-light); font-weight: 800; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .header-inner { padding: 12px 16px; }
      .logo-circle { width: 46px; height: 46px; font-size: 22px; }
      .logo-text h1 { font-size: 16px; }
      nav { order: 3; width: 100%; }
      nav ul { justify-content: center; }
      nav a { padding: 8px 14px; font-size: 13px; }
      .btn-back { padding: 10px 20px; font-size: 13px; }
      .hero { padding: 80px 16px 100px; }
      .hero h2 { font-size: 32px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .lightbox-prev, .lightbox-next { width: 40px; height: 40px; font-size: 30px; }
      .lightbox-prev { right: 10px; }
      .lightbox-next { left: 10px; }
      .toast { min-width: auto; max-width: calc(100vw - 48px); }
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <header id="header">
    <div class="header-inner">
      <a href="talaea-almobdeeen.html" class="logo-area">
        <div class="logo-circle">🖼️</div>
        <div class="logo-text">
          <h1>معرض الصور</h1>
          <p>روضة طلائع المبدعين</p>
        </div>
      </a>
      <nav>
        <ul>
          <li><a href="talaea-almobdeeen.html">الرئيسية</a></li>
          <li><a href="#" class="active">📸 الصور</a></li>
          <li><a href="videos.html">🎬 الفيديوهات</a></li>
        </ul>
      </nav>
      <a href="talaea-almobdeeen.html" class="btn-back">🏠 العودة للروضة</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <span class="hero-badge">📸 معرض اللحظات</span>
      <h2>معرض الصور</h2>
      <p>استكشف أجمل اللحظات والأنشطة من داخل الروضة</p>
    </div>
  </section>

  <div class="wave"></div>

  <section class="gallery-section">
    <div class="section-title">
      <h2>📸 ألبوم الصور</h2>
      <p>لحظات من داخل الروضة وأنشطة الأطفال</p>
    </div>
    <div id="galleryGrid" class="gallery-grid">
      <div class="loading-text"><div class="loading-spinner"></div> جاري تحميل الصور...</div>
    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <span class="lightbox-prev">‹</span>
    <span class="lightbox-next">›</span>
    <img class="lightbox-img" id="lightboxImg" src="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <footer>
    <p>&copy; 2026 <span>روضة طلائع المبدعين</span> — جميع الحقوق محفوظة</p>
  </footer>

  <!-- AOS Library -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // ========== Firebase Config ==========
    const firebaseConfig = {
      apiKey: "AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.firebasestorage.app",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const KG_ID = "kg_talaea";

    // ========== Helper Functions ==========
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-message">${message}</span>`;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => {
        gsap.to(toast, {
          opacity: 0,
          x: -40,
          duration: 0.3,
          onComplete: () => toast.remove()
        });
      }, 4000);
    }

    function formatDate(timestamp) {
      if (!timestamp) return "";
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      if (isNaN(date)) return "";
      return date.toLocaleDateString("ar-EG");
    }

    // ========== Load Images ==========
    let currentImages = [];
    let currentImageIndex = 0;

    async function loadGalleryImages() {
      try {
        // Load only approved images (status === "approved")
        const snapshot = await db.collection("gallery_images")
          .where("status", "==", "approved")
          .orderBy("createdAt", "desc")
          .get();
        
        const galleryGrid = document.getElementById("galleryGrid");
        
        if (snapshot.empty) {
          galleryGrid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>لا توجد صور في المعرض بعد</p></div>`;
          return;
        }
        
        currentImages = [];
        let html = "";
        
        snapshot.forEach(doc => {
          const image = { id: doc.id, ...doc.data() };
          currentImages.push(image);
          
          html += `
            <div class="gallery-card" data-aos="fade-up" data-index="${currentImages.length - 1}">
              <div class="gallery-img" style="background-image: url('${image.imageUrl}');"></div>
              <div class="gallery-info">
                <h3>${image.title || "بدون عنوان"}</h3>
                <p>${image.description || ""}</p>
                <div class="gallery-date">📅 ${formatDate(image.createdAt)}</div>
              </div>
            </div>
          `;
        });
        
        galleryGrid.innerHTML = html;
        
        // Add click events to gallery cards
        document.querySelectorAll('.gallery-card').forEach(card => {
          card.addEventListener('click', () => {
            const index = parseInt(card.dataset.index);
            openLightbox(index);
          });
        });
        
        // GSAP Animation for cards
        gsap.utils.toArray('.gallery-card').forEach((card, i) => {
          gsap.from(card, {
            scrollTrigger: {
              trigger: card,
              start: "top 85%",
              toggleActions: "play none none reverse"
            },
            opacity: 0,
            y: 60,
            duration: 0.8,
            delay: i * 0.1,
            ease: "back.out(1.7)"
          });
        });
        
      } catch (error) {
        console.error("Error loading images:", error);
        document.getElementById("galleryGrid").innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>حدث خطأ في تحميل الصور</p></div>`;
        showToast("حدث خطأ في تحميل الصور", "error");
      }
    }

    // ========== Lightbox Functions ==========
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxCaption = document.getElementById("lightboxCaption");

    function openLightbox(index) {
      if (!currentImages.length) return;
      currentImageIndex = index;
      updateLightbox();
      lightbox.classList.add("active");
      document.body.style.overflow = "hidden";
    }
    
    function updateLightbox() {
      const image = currentImages[currentImageIndex];
      if (image) {
        lightboxImg.src = image.imageUrl;
        lightboxCaption.textContent = image.title || image.description || "";
      }
    }
    
    function nextImage() {
      if (currentImageIndex < currentImages.length - 1) {
        currentImageIndex++;
        updateLightbox();
      }
    }
    
    function prevImage() {
      if (currentImageIndex > 0) {
        currentImageIndex--;
        updateLightbox();
      }
    }
    
    function closeLightbox() {
      lightbox.classList.remove("active");
      document.body.style.overflow = "";
    }

    // ========== Event Listeners ==========
    document.querySelector(".lightbox-close").addEventListener("click", closeLightbox);
    document.querySelector(".lightbox-prev").addEventListener("click", prevImage);
    document.querySelector(".lightbox-next").addEventListener("click", nextImage);
    
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    
    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("active")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "ArrowLeft") prevImage();
    });

    // ========== Header Scroll Effect ==========
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      header.classList.toggle('scrolled', window.scrollY > 50);
    });

    // ========== GSAP Animations ==========
    // Hero Animation
    gsap.from(".hero-badge", {
      opacity: 0,
      y: 30,
      duration: 1,
      ease: "power3.out",
      delay: 0.2
    });

    gsap.from(".hero h2", {
      opacity: 0,
      y: 40,
      duration: 1,
      ease: "power3.out",
      delay: 0.4
    });

    gsap.from(".hero p", {
      opacity: 0,
      y: 30,
      duration: 1,
      ease: "power3.out",
      delay: 0.6
    });

    // Section Title Animation
    gsap.from(".section-title", {
      scrollTrigger: {
        trigger: ".section-title",
        start: "top 80%",
        toggleActions: "play none none reverse"
      },
      opacity: 0,
      y: 50,
      duration: 1,
      ease: "power3.out"
    });

    // AOS Initialization
    AOS.init({
      duration: 800,
      once: true,
      offset: 100
    });

    // ========== Auth Check for Admin Actions (Optional) ==========
    // Check if user is logged in as manager to show admin controls (can be added later)
    const loggedIn = sessionStorage.getItem("loggedIn");
    const userRole = sessionStorage.getItem("userRole");
    
    if (loggedIn && userRole === "manager") {
      // Add admin button to header (optional)
      const headerBtns = document.querySelector(".header-inner");
      if (headerBtns && !document.getElementById("adminGalleryBtn")) {
        const adminBtn = document.createElement("a");
        adminBtn.id = "adminGalleryBtn";
        adminBtn.href = "admin-gallery-manager.html";
        adminBtn.className = "btn-back";
        adminBtn.style.background = "linear-gradient(135deg, var(--mint), #10b981)";
        adminBtn.innerHTML = "⚙️ إدارة الصور";
        headerBtns.appendChild(adminBtn);
      }
    }

    // ========== Load Images ==========
    loadGalleryImages();
  </script>
</body>
</html>
