<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج روضة البراعم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; direction: rtl; }
    .hero-gradient { background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%); }
    .btn-hover { transition: all 0.25s ease; }
    .btn-hover:hover { transform: scale(1.04); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-right">

  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-blue-900">نتائج روضة البراعم</h1>
        <p class="text-sm text-gray-600">صفحة المعلمة الخاصة بروضة البراعم</p>
      </div>

      <div class="flex gap-3">
        <a href="kindergartens.html" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-full font-medium hover:bg-gray-300 btn-hover">
          العودة لاختيار الروضة
        </a>
        <a href="rawdah-baraem.html" class="bg-blue-900 text-white px-5 py-2 rounded-full font-medium hover:bg-blue-800 btn-hover">
          صفحة الروضة
        </a>
      </div>
    </div>
  </header>

  <section class="hero-gradient text-white py-14 md:py-20">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h2 class="text-4xl md:text-5xl font-bold mb-5">نتائج الطلاب - روضة البراعم</h2>
      <p class="text-lg md:text-xl opacity-90 leading-9">
        هذه الصفحة تعرض النتائج المحفوظة فقط لروضة البراعم.
      </p>
    </div>
  </section>

  <section class="py-12">
    <div class="max-w-7xl mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 overflow-x-auto">
        <table class="w-full text-center border-collapse">
          <thead>
            <tr class="bg-blue-900 text-white">
              <th class="p-3 border">اسم الطالب</th>
              <th class="p-3 border">الشعبة</th>
              <th class="p-3 border">النتيجة</th>
              <th class="p-3 border">المرحلة</th>
              <th class="p-3 border">المادة</th>
              <th class="p-3 border">رقم الصفحة</th>
            </tr>
          </thead>
          <tbody id="resultsTable">
            <tr>
              <td colspan="6" class="p-4 border">جاري تحميل النتائج...</td>
            </tr>
          </tbody>
        </table>

        <p id="status" class="mt-5 text-center font-bold text-gray-700">جاري الاتصال بـ Firebase...</p>
      </div>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const table = document.getElementById("resultsTable");
    const status = document.getElementById("status");

    db.collection("results")
      .where("kindergarten", "==", "baraem")
      .get()
      .then(function(snapshot) {
        table.innerHTML = "";

        if (snapshot.empty) {
          table.innerHTML = `
            <tr>
              <td colspan="6" class="p-4 border">لا توجد نتائج حتى الآن</td>
            </tr>
          `;
          status.innerText = "لا توجد نتائج محفوظة لروضة البراعم";
          return;
        }

        snapshot.forEach(function(doc) {
          const data = doc.data();
          const stageMap = {
            tamheedi: "التمهيدي",
            tahdiri: "التحضيري"
          };
          const subjectMap = {
            math: "الرياضيات",
            arabic: "العربي",
            english: "الإنجليزي"
          };

          table.innerHTML += `
            <tr class="bg-white hover:bg-gray-50">
              <td class="p-3 border">${data.studentName || ""}</td>
              <td class="p-3 border">${data.className || ""}</td>
              <td class="p-3 border">${data.score ?? ""} / ${data.total ?? ""}</td>
              <td class="p-3 border">${stageMap[data.stage] || data.stage || ""}</td>
              <td class="p-3 border">${subjectMap[data.subject] || data.subject || ""}</td>
              <td class="p-3 border">${data.pageNumber ?? ""}</td>
            </tr>
          `;
        });

        status.innerText = "تم تحميل نتائج روضة البراعم بنجاح";
      })
      .catch(function(error) {
        console.error(error);
        table.innerHTML = `
          <tr>
            <td colspan="6" class="p-4 border">حدث خطأ أثناء تحميل النتائج</td>
          </tr>
        `;
        status.innerText = "الخطأ: " + error.message;
      });
  </script>

</body>
</html>
