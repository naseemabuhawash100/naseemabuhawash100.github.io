<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج الطلاب</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>نتائج الطلاب</h1>

  <table border="1" cellpadding="10" cellspacing="0" style="margin: 20px auto; border-collapse: collapse; width: 80%;">
    <thead>
      <tr>
        <th>اسم الطالب</th>
        <th>النتيجة</th>
        <th>التمرين</th>
      </tr>
    </thead>
    <tbody id="resultsTable">
      <tr>
        <td colspan="3">جاري التحميل...</td>
      </tr>
    </tbody>
  </table>

  <p id="status"></p>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const table = document.getElementById("resultsTable");
    const status = document.getElementById("status");

    status.innerText = "بدأ الاتصال بـ Firebase";

    db.collection("results").get()
      .then(function(snapshot) {
        table.innerHTML = "";

        if (snapshot.empty) {
          table.innerHTML = 
            <tr>
              <td colspan="3">لا توجد نتائج</td>
            </tr>
          ;
          status.innerText = "تم الاتصال لكن لا توجد نتائج";
          return;
        }

        snapshot.forEach(function(doc) {
          const data = doc.data();
          table.innerHTML += 
            <tr>
              <td>${data.studentName || ""}</td>
              <td>${data.score ?? ""}</td>
              <td>${data.exercise || ""}</td>
            </tr>
          ;
        });

        status.innerText = "تم تحميل النتائج بنجاح";
      })
      .catch(function(error) {
        table.innerHTML = 
          <tr>
            <td colspan="3">حدث خطأ أثناء تحميل النتائج</td>
          </tr>
        ;
        status.innerText = "الخطأ: " + error.message;
        console.error(error);
      });
  </script>

</body>
</html>
