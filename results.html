<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج الطلاب</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f9f9f9;
    }

    h1 {
      color: #1a365d;
      margin-bottom: 20px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 85%;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 12px;
    }

    th {
      background: #1a365d;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>نتائج الطلاب</h1>

  <table>
    <thead>
      <tr>
        <th>اسم الطالب</th>
        <th>النتيجة</th>
        <th>التمرين</th>
      </tr>
    </thead>
    <tbody id="resultsTable">
      <tr>
        <td colspan="3">جاري تحميل النتائج...</td>
      </tr>
    </tbody>
  </table>

  <p id="status">جاري الاتصال بـ Firebase...</p>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const table = document.getElementById("resultsTable");
    const status = document.getElementById("status");

    db.collection("results").get()
      .then(function(snapshot) {
        table.innerHTML = "";

        if (snapshot.empty) {
          table.innerHTML = 
            <tr>
              <td colspan="3">لا توجد نتائج</td>
            </tr>
          ;
          status.innerText = "تم الاتصال لكن لا توجد نتائج";
          return;
        }

        snapshot.forEach(function(doc) {
          const data = doc.data();

          const studentName = data.studentName || "بدون اسم";
          const score = data.score !== undefined ? data.score : "غير موجود";
          const exercise = data.exercise || "غير محدد";

          table.innerHTML += 
            <tr>
              <td>${studentName}</td>
              <td>${score}</td>
              <td>${exercise}</td>
            </tr>
          ;
        });

        status.innerText = "تم تحميل النتائج بنجاح";
      })
      .catch(function(error) {
        console.error(error);
        table.innerHTML = 
          <tr>
            <td colspan="3">حدث خطأ أثناء تحميل النتائج</td>
          </tr>
        ;
        status.innerText = "الخطأ: " + error.message;
      });
  </script>

</body>
</html>
