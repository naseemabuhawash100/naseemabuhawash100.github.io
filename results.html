<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج المعلمة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; direction: rtl; }
    .hero-gradient { background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%); }
    .btn-hover { transition: all 0.25s ease; }
    .btn-hover:hover { transform: scale(1.04); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-right">
  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <div>
        <h1 id="pageTitle" class="text-2xl font-bold text-blue-900">نتائج المعلمة</h1>
        <p id="pageSubtitle" class="text-sm text-gray-600">جاري تحميل بيانات الروضة...</p>
      </div>
      <div class="flex gap-3">
        <a href="kindergartens.html" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-full font-medium hover:bg-gray-300 btn-hover">العودة لاختيار الروضة</a>
        <button id="logoutBtn" class="bg-red-600 text-white px-5 py-2 rounded-full font-medium hover:bg-red-700 btn-hover">تسجيل الخروج</button>
      </div>
    </div>
  </header>

  <section class="hero-gradient text-white py-14 md:py-20">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h2 id="heroTitle" class="text-4xl md:text-5xl font-bold mb-5">نتائج الطلاب</h2>
      <p id="heroText" class="text-lg md:text-xl opacity-90 leading-9">يتم عرض نتائج نفس الروضة ونفس المادة فقط حسب سجل المعلمة.</p>
    </div>
  </section>

  <section class="py-10">
    <div class="max-w-7xl mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
        <h3 class="text-2xl font-bold text-blue-900 mb-6 text-center">فلاتر النتائج</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
          <div><label class="block mb-2 font-medium text-gray-700">التاريخ</label><input id="filterDate" type="date" class="w-full px-4 py-3 rounded-xl border border-gray-300"></div>
          <div><label class="block mb-2 font-medium text-gray-700">رقم الصفحة</label><input id="filterPage" type="number" min="1" placeholder="مثال: 1" class="w-full px-4 py-3 rounded-xl border border-gray-300"></div>
          <div><label class="block mb-2 font-medium text-gray-700">اسم الطالب</label><input id="filterStudent" type="text" placeholder="اكتب اسم الطالب" class="w-full px-4 py-3 rounded-xl border border-gray-300"></div>
          <div><label class="block mb-2 font-medium text-gray-700">كود الطالب</label><input id="filterCode" type="text" placeholder="اكتب الكود" class="w-full px-4 py-3 rounded-xl border border-gray-300"></div>
          <div><label class="block mb-2 font-medium text-gray-700">الصف / الشعبة</label><input id="filterClass" type="text" placeholder="مثال: التمهيدي A" class="w-full px-4 py-3 rounded-xl border border-gray-300"></div>
        </div>
        <div class="flex justify-center gap-3 mt-5">
          <button id="applyFilters" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-medium hover:bg-blue-800 btn-hover">تطبيق</button>
          <button id="resetFilters" class="bg-gray-200 text-gray-800 px-8 py-3 rounded-xl font-medium hover:bg-gray-300 btn-hover">مسح</button>
        </div>
      </div>
    </div>
  </section>

  <section class="pb-12">
    <div class="max-w-7xl mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 overflow-x-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-3 mb-4">
          <p id="status" class="font-bold text-gray-700">جاري الاتصال بـ Firebase...</p>
          <p id="countBox" class="font-medium text-gray-600">عدد النتائج: 0</p>
        </div>
        <table class="w-full text-center border-collapse">
          <thead>
            <tr class="bg-blue-900 text-white">
              <th class="p-3 border">اسم الطالب</th>
              <th class="p-3 border">الكود</th>
              <th class="p-3 border">الشعبة</th>
              <th class="p-3 border">النتيجة</th>
              <th class="p-3 border">المرحلة</th>
              <th class="p-3 border">المادة</th>
              <th class="p-3 border">رقم الصفحة</th>
              <th class="p-3 border">التاريخ</th>
            </tr>
          </thead>
          <tbody id="resultsTable">
            <tr><td colspan="8" class="p-4 border">جاري تحميل النتائج...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    const teacherLoggedIn = sessionStorage.getItem("teacherLoggedIn");
    const teacherKindergarten = sessionStorage.getItem("teacherKindergarten");
    const teacherSubject = sessionStorage.getItem("teacherSubject");
    const teacherName = sessionStorage.getItem("teacherName");
    if (teacherLoggedIn !== "true" || !teacherKindergarten || !teacherSubject || !teacherName) {
      window.location.href = "kindergartens.html";
    }
  </script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();
    const table = document.getElementById("resultsTable");
    const status = document.getElementById("status");
    const countBox = document.getElementById("countBox");
    let allResults = [];
    let currentKindergarten = null;

    function formatStage(stage) {
      const stageMap = { tamheedi: "التمهيدي", tahdiri: "التحضيري" };
      return stageMap[stage] || stage || "";
    }
    function formatSubject(subject) {
      const subjectMap = { math: "الرياضيات", arabic: "العربي", english: "الإنجليزي" };
      return subjectMap[subject] || subject || "";
    }
    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleDateString("ar-EG");
    }
    function extractDateOnly(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return "";
      return d.toISOString().slice(0, 10);
    }
    function renderRows(results) {
      table.innerHTML = "";
      countBox.innerText = `عدد النتائج: ${results.length}`;
      if (!results.length) {
        table.innerHTML = '<tr><td colspan="8" class="p-4 border">لا توجد نتائج مطابقة</td></tr>';
        return;
      }
      results.forEach(function(data) {
        table.innerHTML += `
          <tr class="bg-white hover:bg-gray-50">
            <td class="p-3 border">${data.studentName || ""}</td>
            <td class="p-3 border">${data.studentCode || ""}</td>
            <td class="p-3 border">${data.className || ""}</td>
            <td class="p-3 border">${data.score ?? ""} / ${data.total ?? ""}</td>
            <td class="p-3 border">${formatStage(data.stage)}</td>
            <td class="p-3 border">${formatSubject(data.subject)}</td>
            <td class="p-3 border">${data.pageNumber ?? ""}</td>
            <td class="p-3 border">${formatDate(data.createdAt)}</td>
          </tr>
        `;
      });
    }
    function applyFilters() {
      const filterDate = document.getElementById("filterDate").value;
      const filterPage = document.getElementById("filterPage").value.trim();
      const filterStudent = document.getElementById("filterStudent").value.trim().toLowerCase();
      const filterCode = document.getElementById("filterCode").value.trim().toLowerCase();
      const filterClass = document.getElementById("filterClass").value.trim().toLowerCase();

      const filtered = allResults.filter(function(item) {
        const itemDate = extractDateOnly(item.createdAt);
        const itemPage = String(item.pageNumber ?? "");
        const itemStudent = String(item.studentName || "").toLowerCase();
        const itemCode = String(item.studentCode || "").toLowerCase();
        const itemClass = String(item.className || "").toLowerCase();
        if (filterDate && itemDate !== filterDate) return false;
        if (filterPage && itemPage !== filterPage) return false;
        if (filterStudent && !itemStudent.includes(filterStudent)) return false;
        if (filterCode && !itemCode.includes(filterCode)) return false;
        if (filterClass && !itemClass.includes(filterClass)) return false;
        return true;
      });
      renderRows(filtered);
      status.innerText = `تم عرض ${filtered.length} نتيجة بعد التصفية`;
    }
    function resetFilters() {
      document.getElementById("filterDate").value = "";
      document.getElementById("filterPage").value = "";
      document.getElementById("filterStudent").value = "";
      document.getElementById("filterCode").value = "";
      document.getElementById("filterClass").value = "";
      renderRows(allResults);
      status.innerText = currentKindergarten ? `تمت إعادة عرض كل نتائج ${currentKindergarten.name} - ${formatSubject(sessionStorage.getItem("teacherSubject"))}` : "تمت إعادة عرض كل النتائج";
    }
    async function loadKindergartenInfo() {
      const snap = await db.collection("kindergartens").doc(teacherKindergarten).get();
      if (!snap.exists) {
        window.location.href = "kindergartens.html";
        return null;
      }
      const kg = snap.data();
      document.getElementById("pageTitle").innerText = `نتائج ${kg.name}`;
      document.getElementById("pageSubtitle").innerText = `المعلمة: ${teacherName} | المادة: ${formatSubject(teacherSubject)}`;
      document.getElementById("heroTitle").innerText = `نتائج ${kg.name} - ${formatSubject(teacherSubject)}`;
      document.getElementById("heroText").innerText = "يتم عرض نتائج نفس الروضة ونفس المادة فقط حسب سجل المعلمة.";
      return kg;
    }
    async function loadResults() {
      currentKindergarten = await loadKindergartenInfo();
      if (!currentKindergarten) return;

      status.innerText = "جاري تحميل النتائج...";
      const snap = await db.collection("results")
        .where("kindergarten", "==", teacherKindergarten)
        .where("subject", "==", teacherSubject)
        .get();

      allResults = [];
      snap.forEach(function(doc) { allResults.push(doc.data()); });
      allResults.sort(function(a, b) {
        const da = new Date(a.createdAt || 0).getTime();
        const dbv = new Date(b.createdAt || 0).getTime();
        return dbv - da;
      });

      renderRows(allResults);
      status.innerText = `تم تحميل نتائج ${currentKindergarten.name} - ${formatSubject(teacherSubject)} بنجاح`;
    }

    document.getElementById("applyFilters").addEventListener("click", applyFilters);
    document.getElementById("resetFilters").addEventListener("click", resetFilters);
    document.getElementById("logoutBtn").addEventListener("click", function() {
      sessionStorage.removeItem("teacherLoggedIn");
      sessionStorage.removeItem("teacherKindergarten");
      sessionStorage.removeItem("teacherSubject");
      sessionStorage.removeItem("teacherName");
      window.location.href = "kindergartens.html";
    });

    loadResults().catch(function(error) {
      console.error(error);
      table.innerHTML = '<tr><td colspan="8" class="p-4 border">حدث خطأ أثناء تحميل النتائج</td></tr>';
      status.innerText = "حدث خطأ أثناء تحميل النتائج";
    });
  </script>
</body>
</html>
