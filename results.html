<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج الطلاب</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>نتائج الطلاب</h1>

  <table border="1" cellpadding="10" cellspacing="0" style="margin: 20px auto; border-collapse: collapse; width: 80%;">
    <thead>
      <tr>
        <th>اسم الطالب</th>
        <th>النتيجة</th>
        <th>التمرين</th>
      </tr>
    </thead>
    <tbody id="resultsTable">
      <tr>
        <td colspan="3">جاري تحميل النتائج...</td>
      </tr>
    </tbody>
  </table>

  <p id="status"></p>

  <a href="index.html">العودة للرئيسية</a>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const resultsTable = document.getElementById("resultsTable");
    const status = document.getElementById("status");

    console.log("Firebase شغال");

    db.collection("results").get()
      .then(function(querySnapshot) {
        console.log("عدد النتائج:", querySnapshot.size);

        resultsTable.innerHTML = "";

        if (querySnapshot.empty) {
          resultsTable.innerHTML = 
            <tr>
              <td colspan="3">لا توجد نتائج بعد</td>
            </tr>
          ;
          status.innerText = "لم يتم العثور على نتائج.";
          return;
        }

        querySnapshot.forEach(function(doc) {
          const data = doc.data();
          console.log(data);

          resultsTable.innerHTML += 
            <tr>
              <td>${data.studentName || ""}</td>
              <td>${data.score ?? ""}</td>
              <td>${data.exercise || ""}</td>
            </tr>
          ;
        });

        status.innerText = "تم تحميل النتائج بنجاح.";
      })
      .catch(function(error) {
        console.error("خطأ:", error);
        resultsTable.innerHTML = 
          <tr>
            <td colspan="3">حدث خطأ في تحميل النتائج</td>
          </tr>
        ;
        status.innerText = "خطأ: " + error.message;
      });
  </script>

</body>
</html>
