<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - Supabase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; direction: rtl; }
    .hero-gradient { background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-right">
  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col lg:flex-row items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-blue-900">لوحة التحكم الرئيسية</h1>
        <p class="text-sm text-gray-600">الخطوة الأولى: ربط رفع ملفات التمارين مع Supabase</p>
      </div>
      <div class="flex gap-3">
        <a href="index.html" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-full font-medium hover:bg-gray-300">العودة للرئيسية</a>
      </div>
    </div>
  </header>

  <section class="hero-gradient text-white py-12">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <h2 class="text-4xl md:text-5xl font-bold mb-4">رفع ملفات التمرين</h2>
      <p class="text-lg opacity-90 leading-9">ارفعي HTML وCSS وJS والصور أو ZIP، وسيتم حفظ الروابط في Firestore.</p>
    </div>
  </section>

  <section class="py-8">
    <div class="max-w-5xl mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
        <h3 class="text-2xl font-bold text-blue-900 mb-5">إضافة / تعديل تمرين</h3>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <input id="pageKgSelect" type="text" placeholder="معرف الروضة مثل zahraa" class="px-4 py-3 rounded-xl border border-gray-300">
          <select id="pageStage" class="px-4 py-3 rounded-xl border border-gray-300">
            <option value="">اختر المرحلة</option>
            <option value="tamheedi">التمهيدي</option>
            <option value="tahdiri">التحضيري</option>
          </select>
          <select id="pageSubject" class="px-4 py-3 rounded-xl border border-gray-300">
            <option value="">اختر المادة</option>
            <option value="math">الرياضيات</option>
            <option value="arabic">العربي</option>
            <option value="english">الإنجليزي</option>
          </select>
          <input id="pageNumber" type="number" min="1" max="50" placeholder="رقم الصفحة" class="px-4 py-3 rounded-xl border border-gray-300">
          <input id="pageTitleInput" type="text" placeholder="عنوان الصفحة" class="px-4 py-3 rounded-xl border border-gray-300">
        </div>

        <div class="mt-5 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="border rounded-2xl p-4 bg-gray-50">
            <h4 class="font-bold text-blue-900 mb-3">الخيار 1: رفع ملف ZIP كامل</h4>
            <input id="zipFile" type="file" accept=".zip" class="w-full px-3 py-3 rounded-xl border border-gray-300 bg-white">
            <p class="text-xs text-gray-500 mt-2">ارفعي مشروع التمرين كاملًا كملف zip.</p>
          </div>
          <div class="border rounded-2xl p-4 bg-gray-50">
            <h4 class="font-bold text-blue-900 mb-3">الخيار 2: رفع ملفات منفصلة</h4>
            <div class="space-y-3">
              <input id="htmlFile" type="file" accept=".html,.htm" class="w-full px-3 py-2 rounded-xl border border-gray-300 bg-white">
              <input id="cssFile" type="file" accept=".css" class="w-full px-3 py-2 rounded-xl border border-gray-300 bg-white">
              <input id="jsFile" type="file" accept=".js" class="w-full px-3 py-2 rounded-xl border border-gray-300 bg-white">
              <input id="imageFiles" type="file" accept="image/*" multiple class="w-full px-3 py-2 rounded-xl border border-gray-300 bg-white">
            </div>
          </div>
        </div>

        <textarea id="exerciseCode" rows="8" placeholder="اختياري: الصقي كود HTML مباشر هنا إذا أردت..." class="w-full mt-4 px-4 py-3 rounded-xl border border-gray-300 font-mono text-sm"></textarea>

        <div class="mt-4 flex flex-wrap gap-3">
          <button id="savePageBtn" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-purple-700">حفظ الصفحة</button>
        </div>
        <p id="pageMsg" class="mt-4 text-sm font-medium text-gray-700"></p>
      </div>
    </div>
  </section>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const SUPABASE_URL = "https://sdmjyxtvubwhbtzhbsop.supabase.co";
    const SUPABASE_KEY = "sb_publishable_PtGbXmQR-7sLcGnGfypM_Q_nF3xX2dC";
    const SUPABASE_BUCKET = "interactive-exercises";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function pageDocId(k,s,sub,p){ return k+"__"+s+"__"+sub+"__p"+String(p).padStart(2,"0"); }
    function pageStorageBase(k,s,sub,p){ return k+"/"+s+"/"+sub+"/p"+String(p).padStart(2,"0"); }

    async function uploadToSupabase(path, file) {
      const { error } = await supabaseClient.storage.from(SUPABASE_BUCKET).upload(path, file, { upsert: true });
      if (error) throw error;
      const { data } = supabaseClient.storage.from(SUPABASE_BUCKET).getPublicUrl(path);
      return { path, name: file.name, url: data.publicUrl, size: file.size || 0, type: file.type || "" };
    }

    async function uploadFilesToSupabase(basePath) {
      const zipFile = document.getElementById("zipFile").files[0];
      const htmlFile = document.getElementById("htmlFile").files[0];
      const cssFile = document.getElementById("cssFile").files[0];
      const jsFile = document.getElementById("jsFile").files[0];
      const imageFiles = Array.from(document.getElementById("imageFiles").files || []);

      let payload = { uploadMode: "code", files: {}, images: [] };

      if (zipFile) {
        payload.uploadMode = "zip";
        payload.files.zip = await uploadToSupabase(basePath + "/bundle/" + zipFile.name, zipFile);
        return payload;
      }

      if (htmlFile || cssFile || jsFile || imageFiles.length) {
        payload.uploadMode = "files";
        if (htmlFile) payload.files.html = await uploadToSupabase(basePath + "/html/" + htmlFile.name, htmlFile);
        if (cssFile) payload.files.css = await uploadToSupabase(basePath + "/css/" + cssFile.name, cssFile);
        if (jsFile) payload.files.js = await uploadToSupabase(basePath + "/js/" + jsFile.name, jsFile);
        for (const img of imageFiles) {
          const uploaded = await uploadToSupabase(basePath + "/images/" + img.name, img);
          payload.images.push(uploaded);
        }
      }

      return payload;
    }

    document.getElementById("savePageBtn").addEventListener("click", async function() {
      const kindergartenId = document.getElementById("pageKgSelect").value.trim().toLowerCase();
      const stage = document.getElementById("pageStage").value;
      const subject = document.getElementById("pageSubject").value;
      const pageNumber = document.getElementById("pageNumber").value.trim();
      const title = document.getElementById("pageTitleInput").value.trim();
      const code = document.getElementById("exerciseCode").value;
      const msg = document.getElementById("pageMsg");

      if (!kindergartenId || !stage || !subject || !pageNumber) {
        msg.innerText = "يرجى تعبئة الروضة والمرحلة والمادة ورقم الصفحة";
        msg.className = "mt-4 text-sm font-medium text-red-600";
        return;
      }

      const p = Number(pageNumber);
      if (isNaN(p) || p < 1 || p > 50) {
        msg.innerText = "رقم الصفحة يجب أن يكون بين 1 و 50";
        msg.className = "mt-4 text-sm font-medium text-red-600";
        return;
      }

      try {
        msg.innerText = "جاري حفظ التمرين ورفع الملفات...";
        msg.className = "mt-4 text-sm font-medium text-blue-700";

        const basePath = pageStorageBase(kindergartenId, stage, subject, p);
        const uploadData = await uploadFilesToSupabase(basePath);

        await db.collection("interactive_pages").doc(pageDocId(kindergartenId,stage,subject,p)).set({
          kindergartenId, stage, subject, pageNumber:p, title, code,
          uploadMode: uploadData.uploadMode,
          files: uploadData.files || {},
          images: uploadData.images || [],
          updatedAt: new Date().toISOString()
        }, { merge: true });

        msg.innerText = "تم حفظ التمرين ورفع ملفاته بنجاح";
        msg.className = "mt-4 text-sm font-medium text-green-600";
      } catch (error) {
        console.error(error);
        msg.innerText = "حدث خطأ أثناء رفع الملفات أو حفظ التمرين: " + (error.message || "خطأ غير معروف");
        msg.className = "mt-4 text-sm font-medium text-red-600";
      }
    });
  </script>
</body>
</html>
