<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عارض صور التمارين</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; direction: rtl; }
    .thumb { aspect-ratio: 1 / 1; object-fit: contain; background: linear-gradient(135deg,#f8fafc,#eef2ff); }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="bg-white shadow-sm border-b sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
      <div>
        <h1 class="text-2xl font-extrabold text-blue-900">عارض صور التمارين</h1>
        <p class="text-sm text-slate-600">يعرض الصور المحفوظة في Firebase داخل حقل <span class="font-bold">images</span> وروابطها العامة من Supabase.</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <a href="admin-data-manager.html" class="px-4 py-2 rounded-xl bg-slate-200 hover:bg-slate-300">العودة للوحة التحكم</a>
        <button id="refreshBtn" class="px-4 py-2 rounded-xl bg-blue-900 text-white hover:bg-blue-800">تحديث</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
      <div class="grid grid-cols-1 md:grid-cols-6 gap-3 items-end">
        <div class="md:col-span-2">
          <label class="block text-sm font-bold mb-2">اختيار التمرين</label>
          <select id="pageSelect" class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-white"></select>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">الروضة</label>
          <input id="kgInput" type="text" class="w-full px-4 py-3 rounded-xl border border-slate-300" placeholder="مثل zahraa">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">المرحلة</label>
          <select id="stageInput" class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-white">
            <option value="">الكل</option>
            <option value="tamheedi">التمهيدي</option>
            <option value="tahdiri">التحضيري</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">المادة</label>
          <select id="subjectInput" class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-white">
            <option value="">الكل</option>
            <option value="math">الرياضيات</option>
            <option value="arabic">العربي</option>
            <option value="english">الإنجليزي</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">رقم الصفحة</label>
          <input id="pageNumberInput" type="number" min="1" class="w-full px-4 py-3 rounded-xl border border-slate-300" placeholder="مثل 1">
        </div>
      </div>
      <div class="mt-4 flex flex-wrap gap-2">
        <button id="openBtn" class="px-5 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700">عرض الصور</button>
        <button id="showAllBtn" class="px-5 py-3 rounded-xl bg-slate-700 text-white font-bold hover:bg-slate-800">عرض كل التمارين التي فيها صور</button>
      </div>
      <p id="status" class="mt-4 text-sm font-medium text-slate-600">جاري تحميل التمارين...</p>
    </section>

    <section id="summaryCard" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
      <h2 class="text-xl font-extrabold text-blue-900 mb-4">معلومات التمرين</h2>
      <div id="summaryGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 text-sm"></div>
    </section>

    <section id="imagesSection" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
      <div class="flex items-center justify-between gap-3 mb-4">
        <h2 class="text-xl font-extrabold text-blue-900">الصور المرتبطة بالتمرين</h2>
        <span id="imagesCount" class="px-3 py-1 rounded-full bg-blue-50 text-blue-900 text-sm font-bold"></span>
      </div>
      <div id="imagesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </section>

    <section id="allExercisesSection" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
      <div class="flex items-center justify-between gap-3 mb-4">
        <h2 class="text-xl font-extrabold text-blue-900">كل التمارين التي تحتوي صورًا</h2>
        <span id="allCount" class="px-3 py-1 rounded-full bg-emerald-50 text-emerald-900 text-sm font-bold"></span>
      </div>
      <div id="allExercisesList" class="space-y-4"></div>
    </section>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const statusEl = document.getElementById('status');
    const pageSelect = document.getElementById('pageSelect');
    const kgInput = document.getElementById('kgInput');
    const stageInput = document.getElementById('stageInput');
    const subjectInput = document.getElementById('subjectInput');
    const pageNumberInput = document.getElementById('pageNumberInput');
    const summaryCard = document.getElementById('summaryCard');
    const summaryGrid = document.getElementById('summaryGrid');
    const imagesSection = document.getElementById('imagesSection');
    const imagesGrid = document.getElementById('imagesGrid');
    const imagesCount = document.getElementById('imagesCount');
    const allExercisesSection = document.getElementById('allExercisesSection');
    const allExercisesList = document.getElementById('allExercisesList');
    const allCount = document.getElementById('allCount');

    let pages = [];

    function escapeHtml(text) {
      return String(text ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function stageLabel(v){ return v==='tamheedi' ? 'التمهيدي' : v==='tahdiri' ? 'التحضيري' : (v || '-'); }
    function subjectLabel(v){ return v==='math' ? 'الرياضيات' : v==='arabic' ? 'العربي' : v==='english' ? 'الإنجليزي' : (v || '-'); }
    function fileNameFromUrl(url){
      try {
        const clean = String(url || '').split('?')[0];
        return decodeURIComponent(clean.substring(clean.lastIndexOf('/') + 1)) || '-';
      } catch(e) { return '-'; }
    }
    function pageLabel(p){
      return `${p.title || 'بدون عنوان'} — ${p.kindergartenId || '-'} / ${stageLabel(p.stage)} / ${subjectLabel(p.subject)} / صفحة ${p.pageNumber || '-'}`;
    }
    function syncInputsFromDocId(docId){
      const p = pages.find(x => x.docId === docId);
      if (!p) return;
      kgInput.value = p.kindergartenId || '';
      stageInput.value = p.stage || '';
      subjectInput.value = p.subject || '';
      pageNumberInput.value = p.pageNumber || '';
    }

    async function loadPages(){
      statusEl.textContent = 'جاري تحميل التمارين من Firebase...';
      const snap = await db.collection('interactive_pages').get();
      pages = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }))
        .sort((a,b) => String(a.kindergartenId || '').localeCompare(String(b.kindergartenId || ''), 'ar') || Number(a.pageNumber || 0) - Number(b.pageNumber || 0));
      renderPageSelect();
      statusEl.textContent = `تم تحميل ${pages.length} تمرينًا.`;
      autoOpenFromQuery();
    }

    function renderPageSelect(){
      pageSelect.innerHTML = '<option value="">اختاري تمرينًا محفوظًا</option>';
      pages.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.docId;
        opt.textContent = pageLabel(p);
        pageSelect.appendChild(opt);
      });
    }

    function renderSummary(p){
      summaryCard.classList.remove('hidden');
      const items = [
        ['معرف المستند', p.docId || '-'],
        ['الروضة', p.kindergartenId || '-'],
        ['المرحلة', stageLabel(p.stage)],
        ['المادة', subjectLabel(p.subject)],
        ['رقم الصفحة', p.pageNumber || '-'],
        ['عنوان التمرين', p.title || '-'],
        ['نوع الرفع', p.uploadMode || '-'],
        ['عدد الصور', (p.images || []).length],
      ];
      summaryGrid.innerHTML = items.map(([label, value]) =>
        `<div class="rounded-xl border border-slate-200 bg-slate-50 p-3"><div class="text-xs text-slate-500 mb-1">${escapeHtml(label)}</div><div class="font-bold text-slate-900 break-words">${escapeHtml(value)}</div></div>`
      ).join('');
    }

    function renderImages(p){
      const images = Array.isArray(p.images) ? p.images : [];
      imagesSection.classList.remove('hidden');
      imagesCount.textContent = `${images.length} صورة`;
      if (!images.length){
        imagesGrid.innerHTML = '<div class="col-span-full rounded-xl border border-amber-200 bg-amber-50 p-4 text-amber-900">هذا التمرين لا يحتوي صورًا محفوظة داخل الحقل <b>images</b>.</div>';
        return;
      }
      imagesGrid.innerHTML = images.map((img, index) => {
        const name = img?.name || fileNameFromUrl(img?.url) || `image-${index+1}`;
        const url = img?.url || '';
        const path = img?.path || '-';
        const type = img?.type || '-';
        return `
          <article class="rounded-2xl border border-slate-200 overflow-hidden bg-white shadow-sm">
            <div class="p-3 border-b border-slate-100 bg-slate-50 flex items-center justify-between gap-2">
              <span class="font-extrabold text-slate-900 line-clamp-2">${escapeHtml(name)}</span>
              <span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-900">#${index+1}</span>
            </div>
            <div class="p-3">
              <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="block rounded-xl overflow-hidden border border-slate-200 mb-3">
                <img src="${escapeHtml(url)}" alt="${escapeHtml(name)}" class="thumb w-full" onerror="this.closest('a').insertAdjacentHTML('afterend','<div class=&quot;rounded-xl border border-red-200 bg-red-50 text-red-700 p-3 text-sm mt-3&quot;>تعذر تحميل الصورة من الرابط العام.</div>'); this.closest('a').remove();">
              </a>
              <div class="space-y-2 text-sm">
                <div><span class="font-bold">الاسم:</span> <span class="break-all">${escapeHtml(name)}</span></div>
                <div><span class="font-bold">المسار:</span> <span class="break-all">${escapeHtml(path)}</span></div>
                <div><span class="font-bold">النوع:</span> ${escapeHtml(type)}</div>
                <div><span class="font-bold">الرابط:</span> <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="text-blue-700 underline break-all">فتح الرابط</a></div>
              </div>
            </div>
          </article>`;
      }).join('');
    }

    function showPageByDoc(docId){
      const p = pages.find(x => x.docId === docId);
      if (!p){
        statusEl.textContent = 'لم يتم العثور على التمرين المطلوب.';
        statusEl.className = 'mt-4 text-sm font-medium text-red-600';
        return;
      }
      statusEl.textContent = `تم فتح التمرين: ${p.title || p.docId}`;
      statusEl.className = 'mt-4 text-sm font-medium text-green-700';
      pageSelect.value = p.docId;
      syncInputsFromDocId(p.docId);
      renderSummary(p);
      renderImages(p);
      allExercisesSection.classList.add('hidden');
      const url = new URL(window.location.href);
      url.searchParams.set('docId', p.docId);
      history.replaceState({}, '', url);
    }

    function showPageByFields(){
      const kg = kgInput.value.trim().toLowerCase();
      const stage = stageInput.value;
      const subject = subjectInput.value;
      const pageNumber = String(pageNumberInput.value || '').trim();
      const p = pages.find(x =>
        (!kg || String(x.kindergartenId || '').toLowerCase() === kg) &&
        (!stage || x.stage === stage) &&
        (!subject || x.subject === subject) &&
        (!pageNumber || String(x.pageNumber) === pageNumber)
      );
      if (!p){
        statusEl.textContent = 'لم أجد تمرينًا بهذه البيانات.';
        statusEl.className = 'mt-4 text-sm font-medium text-red-600';
        summaryCard.classList.add('hidden');
        imagesSection.classList.add('hidden');
        return;
      }
      showPageByDoc(p.docId);
    }

    function renderAllExercisesWithImages(){
      const list = pages.filter(p => Array.isArray(p.images) && p.images.length);
      allExercisesSection.classList.remove('hidden');
      summaryCard.classList.add('hidden');
      imagesSection.classList.add('hidden');
      allCount.textContent = `${list.length} تمرين`;
      if (!list.length){
        allExercisesList.innerHTML = '<div class="rounded-xl border border-amber-200 bg-amber-50 p-4 text-amber-900">لا توجد تمارين تحتوي صورًا محفوظة حاليًا.</div>';
        return;
      }
      allExercisesList.innerHTML = list.map(p => `
        <div class="rounded-2xl border border-slate-200 p-4 bg-slate-50">
          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
            <div>
              <div class="font-extrabold text-slate-900">${escapeHtml(p.title || 'بدون عنوان')}</div>
              <div class="text-sm text-slate-600 mt-1">${escapeHtml(p.kindergartenId || '-')} — ${escapeHtml(stageLabel(p.stage))} — ${escapeHtml(subjectLabel(p.subject))} — صفحة ${escapeHtml(p.pageNumber)}</div>
              <div class="text-sm text-slate-500 mt-1">عدد الصور: ${escapeHtml((p.images || []).length)}</div>
            </div>
            <div class="flex flex-wrap gap-2">
              <button data-doc="${escapeHtml(p.docId)}" class="open-single px-4 py-2 rounded-xl bg-blue-900 text-white hover:bg-blue-800">فتح الصور</button>
            </div>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-3 mt-4">
            ${(p.images || []).slice(0,6).map(img => `
              <a href="${escapeHtml(img.url || '#')}" target="_blank" rel="noopener noreferrer" class="block rounded-xl overflow-hidden border border-slate-200 bg-white">
                <img src="${escapeHtml(img.url || '')}" alt="${escapeHtml(img.name || '')}" class="thumb w-full">
              </a>
            `).join('')}
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.open-single').forEach(btn => btn.addEventListener('click', () => showPageByDoc(btn.dataset.doc)));
    }

    function autoOpenFromQuery(){
      const params = new URLSearchParams(window.location.search);
      const docId = params.get('docId');
      if (docId && pages.some(p => p.docId === docId)) {
        showPageByDoc(docId);
      }
    }

    pageSelect.addEventListener('change', () => {
      if (pageSelect.value) showPageByDoc(pageSelect.value);
    });
    document.getElementById('openBtn').addEventListener('click', showPageByFields);
    document.getElementById('showAllBtn').addEventListener('click', renderAllExercisesWithImages);
    document.getElementById('refreshBtn').addEventListener('click', loadPages);

    loadPages().catch(err => {
      console.error(err);
      statusEl.textContent = 'تعذر تحميل البيانات من Firebase.';
      statusEl.className = 'mt-4 text-sm font-medium text-red-600';
    });
  </script>
</body>
</html>
