<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>روضة طلائع المبدعين</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#f3f4f6}
.box{background:white;padding:20px;margin:20px auto;width:300px;border-radius:10px}
button{padding:10px;width:100%;margin-top:10px;background:#2563eb;color:white}
</style>
</head>

<body>

<h2>روضة طلائع المبدعين</h2>

<button onclick="openLogin()">دخول الإدارة</button>

<div id="loginBox" class="box" style="display:none">
<input id="email" placeholder="الايميل"><br><br>
<input id="pass" type="password" placeholder="كلمة المرور"><br>
<p id="err" style="color:red"></p>
<button onclick="login()">دخول</button>
</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
authDomain:"interactive-book-37270.firebaseapp.com",
projectId:"interactive-book-37270"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function openLogin(){
document.getElementById("loginBox").style.display="block";
}

async function login(){
const email = document.getElementById("email").value;
const pass = document.getElementById("pass").value;

try{
const res = await auth.signInWithEmailAndPassword(email,pass);

const doc = await db.collection("users").doc(res.user.uid).get();
const data = doc.data();

if(data.role === "teacher"){
window.location.href="teacher-dashboard.html";
}else{
window.location.href="talaea-admin.html";
}

}catch(e){
document.getElementById("err").innerText=e.message;
}
}

</script>

</body>
</html>
