<button onclick="login()">دخول الإدارة</button>

<script>
const firebaseConfig = {

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

function login(){
const email = prompt("ادخل الايميل");

auth.signInWithEmailAndPassword(email,pass)

.catch(e=>{

});
}
