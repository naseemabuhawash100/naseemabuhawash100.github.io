<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار تسجيل الدخول - نسخة مبسطة</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; }
        button { padding: 10px 30px; background: blue; color: white; border: none; cursor: pointer; }
        .error { color: red; margin-top: 20px; }
        .success { color: green; margin-top: 20px; }
        .info { color: blue; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🔐 اختبار تسجيل الدخول</h2>
    <p>روضة طلائع المبدعين</p>
    
    <input type="email" id="email" placeholder="البريد الإلكتروني" value="admin2@gmail.com">
    <input type="password" id="password" placeholder="كلمة المرور" value="123456">
    <button onclick="login()">تسجيل الدخول</button>
    
    <div id="result"></div>
    <div id="firestoreResult"></div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
            authDomain: "interactive-book-37270.firebaseapp.com",
            projectId: "interactive-book-37270",
            storageBucket: "interactive-book-37270.firebasestorage.app",
            messagingSenderId: "350364566140",
            appId: "1:350364566140:web:7997fb848a9b512f6b7ff9"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // المعرف الصحيح للروضة
        const KG_ID = "kg_talaea";
        
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            const firestoreDiv = document.getElementById('firestoreResult');
            
            resultDiv.innerHTML = "⏳ جاري تسجيل الدخول...";
            resultDiv.className = "info";
            firestoreDiv.innerHTML = "";
            
            try {
                // الخطوة 1: تسجيل الدخول إلى Authentication
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                resultDiv.innerHTML = "✅ الخطوة 1: نجح تسجيل الدخول إلى Firebase<br>UID: " + uid;
                resultDiv.className = "success";
                
                // الخطوة 2: جلب البيانات من Firestore
                const userDoc = await db.collection("users").doc(uid).get();
                
                if (!userDoc.exists) {
                    firestoreDiv.innerHTML = "❌ الخطوة 2: لا توجد بيانات للمستخدم في Firestore";
                    firestoreDiv.className = "error";
                    return;
                }
                
                const data = userDoc.data();
                firestoreDiv.innerHTML = "✅ الخطوة 2: تم جلب البيانات من Firestore<br>" +
                    "الاسم: " + (data.name || "-") + "<br>" +
                    "الدور: " + (data.role || "-") + "<br>" +
                    "الروضة: " + (data.kindergartenId || "-") + "<br>" +
                    "مفعل: " + (data.isActive ? "نعم" : "لا");
                firestoreDiv.className = "success";
                
                // الخطوة 3: التحقق من البيانات
                if (data.isActive !== true) {
                    firestoreDiv.innerHTML += "<br>❌ الحساب غير مفعل";
                    firestoreDiv.className = "error";
                    return;
                }
                
                if (data.kindergartenId !== KG_ID) {
                    firestoreDiv.innerHTML += "<br>❌ الروضة غير متطابقة!<br>" +
                        "المطلوب: " + KG_ID + "<br>" +
                        "الموجود: " + data.kindergartenId;
                    firestoreDiv.className = "error";
                    return;
                }
                
                if (data.role === "kindergarten_manager") {
                    firestoreDiv.innerHTML += "<br>🚀 سيتم التوجيه إلى لوحة المديرة...";
                    // window.location.href = "manager-dashboard.html";
                } else if (data.role === "teacher") {
                    firestoreDiv.innerHTML += "<br>🚀 سيتم التوجيه إلى لوحة المعلمة...";
                    // window.location.href = "teacher-dashboard.html";
                } else {
                    firestoreDiv.innerHTML += "<br>❌ دور غير معروف: " + data.role;
                    firestoreDiv.className = "error";
                }
                
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "❌ فشل تسجيل الدخول: " + error.message;
                resultDiv.className = "error";
                resultDiv.innerHTML += "<br>رمز الخطأ: " + (error.code || "غير معروف");
            }
        }
        
        // طباعة معلومات عند تحميل الصفحة
        console.log("✅ صفحة الاختبار جاهزة");
        console.log("KG_ID المستخدم:", KG_ID);
    </script>
</body>
</html>
