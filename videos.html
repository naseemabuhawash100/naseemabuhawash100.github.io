<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>معرض الفيديوهات - روضة طلائع المبدعين</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <!-- إضافة مكتبة AOS للحركات -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --navy: #0f2d5c;
      --navy-light: #1a4a8a;
      --gold: #f5a623;
      --gold-light: #fbbf24;
      --teal: #0e7490;
      --teal-light: #159db9;
      --coral: #ff6b6b;
      --mint: #4ecdc4;
      --lavender: #a78bfa;
      --light: #f0f6ff;
      --white: #ffffff;
      --gray-100: #f1f5f9;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-md: 0 10px 25px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
      --shadow-xl: 0 25px 50px rgba(0,0,0,0.15);
      --radius: 16px;
      --radius-lg: 24px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Tajawal', sans-serif;
      direction: rtl;
      background: linear-gradient(180deg, #f8fafd 0%, #f0f6ff 100%);
      color: var(--gray-800);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    .animate-fade-in-up { animation: fadeInUp 0.7s ease-out; }
    .animate-fade-in-down { animation: fadeInDown 0.7s ease-out; }
    .animate-scale-in { animation: scaleIn 0.5s ease-out; }
    .animate-float { animation: float 3s ease-in-out infinite; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 2px solid var(--gold);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    header.scrolled {
      background: rgba(255,255,255,0.98);
      box-shadow: var(--shadow-md);
    }
    .header-inner {
      max-width: 1280px; margin: auto;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .logo-area { display: flex; align-items: center; gap: 16px; }
    .logo-circle {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--navy), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: white; font-weight: 900;
      box-shadow: 0 4px 15px rgba(15,45,92,0.3);
      transition: var(--transition);
    }
    .logo-circle:hover { transform: rotate(10deg) scale(1.05); }
    .logo-text h1 {
      font-size: 20px; font-weight: 900; color: var(--navy);
      line-height: 1.3; margin-bottom: 2px;
    }
    .logo-text p { font-size: 13px; color: var(--gray-600); }

    nav ul { display: flex; gap: 4px; list-style: none; flex-wrap: wrap; }
    nav a {
      display: block; padding: 8px 16px; border-radius: 99px;
      font-size: 14px; font-weight: 700; color: var(--gray-600);
      text-decoration: none; transition: var(--transition);
    }
    nav a:hover { color: var(--navy); background: var(--light); }

    .btn-back {
      background: linear-gradient(135deg, var(--gray-100), #e2e8f0);
      color: var(--gray-600);
      border: none;
      border-radius: 99px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
    }
    .btn-back:hover {
      transform: translateY(-2px);
      background: var(--gray-100);
    }

    /* HERO */
    .hero {
      background: linear-gradient(145deg, var(--navy) 0%, var(--navy-light) 55%, var(--teal) 100%);
      color: white; padding: 60px 24px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero::after {
      content: ''; position: absolute; top: -50%; right: -20%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: 1280px; margin: auto;
      text-align: center;
      position: relative; z-index: 1;
    }
    .hero h2 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 900; line-height: 1.3;
      margin-bottom: 16px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }
    .hero p {
      font-size: 17px; opacity: 0.9; line-height: 1.9;
    }

    /* ALBUMS SECTION */
    .albums-section {
      padding: 80px 24px;
    }
    .section-title {
      text-align: center; margin-bottom: 60px;
    }
    .section-title h2 {
      font-size: 32px; font-weight: 900; color: var(--navy);
      margin-bottom: 12px;
    }
    .section-title p {
      color: var(--gray-600); font-size: 16px;
    }
    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .album-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .album-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl);
    }
    .album-cover {
      width: 100%; height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .album-cover::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4));
    }
    .album-stats {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(4px);
      z-index: 1;
    }
    .album-info { padding: 20px; }
    .album-info h3 {
      font-size: 20px; font-weight: 900; color: var(--navy);
      margin-bottom: 8px;
    }
    .album-info p {
      font-size: 14px; color: var(--gray-600); line-height: 1.7;
    }
    .album-date {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* VIDEOS SECTION (inside album) */
    .videos-section {
      padding: 40px 24px 80px;
    }
    .back-to-albums {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: var(--teal);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 30px;
      padding: 8px 16px;
      border-radius: 99px;
      transition: var(--transition);
    }
    .back-to-albums:hover {
      background: var(--light);
      transform: translateX(-5px);
    }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 28px;
    }
    .video-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid var(--border);
    }
    .video-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }
    .video-iframe {
      width: 100%; height: 200px;
      border: none;
    }
    .video-info { padding: 16px; }
    .video-info h4 {
      font-size: 16px; font-weight: 800; color: var(--navy);
      margin-bottom: 6px;
    }
    .video-info p {
      font-size: 13px; color: var(--gray-600);
      line-height: 1.6;
    }
    .video-date {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* LOADING */
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-100);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      text-align: center;
      padding: 60px;
      color: var(--gray-600);
    }
    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--gray-500);
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    /* TOAST */
    .toast-container {
      position: fixed;
      top: 100px;
      left: 24px;
      z-index: 10001;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toast {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: var(--shadow-lg);
      border-right: 4px solid var(--navy);
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 280px;
      animation: slideInLeft 0.3s ease;
    }
    .toast.info { border-right-color: var(--teal); }
    .toast-icon { font-size: 20px; }
    .toast-message { font-size: 14px; font-weight: 700; color: var(--gray-800); }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner { padding: 12px 16px; }
      .logo-circle { width: 48px; height: 48px; font-size: 22px; }
      .logo-text h1 { font-size: 17px; }
      nav a { padding: 6px 12px; font-size: 13px; }
      .hero { padding: 40px 16px; }
      .hero h2 { font-size: 28px; }
      .albums-grid { grid-template-columns: 1fr; }
      .videos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <header>
    <div class="header-inner">
      <div class="logo-area">
        <div class="logo-circle">🎬</div>
        <div class="logo-text">
          <h1>معرض الفيديوهات</h1>
          <p id="pageSubtitle">روضة طلائع المبدعين</p>
        </div>
      </div>
      <nav>
        <ul>
          <li><a href="talaea-almobdeeen.html">🏠 الرئيسية</a></li>
          <li><a href="exercises.html">📚 التمارين</a></li>
          <li><a href="gallery.html">📸 الصور</a></li>
          <li><a href="#" id="albumsTabBtn" class="active-tab">📁 الألبومات</a></li>
        </ul>
      </nav>
      <a href="talaea-almobdeeen.html" class="btn-back">🏠 العودة للروضة</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner" data-aos="fade-down">
      <h2>🎬 معرض الفيديوهات</h2>
      <p>شاهد أجمل الفيديوهات التعليمية والترفيهية من داخل الروضة</p>
    </div>
  </section>

  <!-- الألبومات -->
  <div id="albumsView" class="albums-section">
    <div class="section-title" data-aos="fade-down">
      <h2>📁 ألبومات الفيديو</h2>
      <p>اختر الألبوم لمشاهدة الفيديوهات</p>
    </div>
    <div id="albumsGrid" class="albums-grid">
      <div class="loading-text"><div class="loading-spinner"></div> جاري تحميل الألبومات...</div>
    </div>
  </div>

  <!-- الفيديوهات داخل الألبوم -->
  <div id="videosView" class="videos-section" style="display: none;">
    <button class="back-to-albums" id="backToAlbumsBtn">
      <span>←</span> العودة إلى الألبومات
    </button>
    <div id="albumHeader" class="section-title" style="margin-bottom: 30px;"></div>
    <div id="videosGrid" class="videos-grid"></div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.firebasestorage.app",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const KG_ID = "kg_talaea";

    // Elements
    const albumsView = document.getElementById("albumsView");
    const videosView = document.getElementById("videosView");
    const albumsGrid = document.getElementById("albumsGrid");
    const videosGrid = document.getElementById("videosGrid");
    const albumHeader = document.getElementById("albumHeader");
    const toastContainer = document.getElementById("toastContainer");

    let currentAlbum = null;

    // Toast
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-message">${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideInLeft 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Extract YouTube ID from URL
    function extractYouTubeId(url) {
      if (!url) return null;
      const regExp = /(?:youtube\.com\/embed\/|youtu\.be\/|youtube\.com\/watch\?v=)([^&\s]+)/;
      const match = url.match(regExp);
      return match ? match[1] : null;
    }

    function getYouTubeEmbedUrl(url) {
      const videoId = extractYouTubeId(url);
      if (videoId) return `https://www.youtube.com/embed/${videoId}`;
      return url;
    }

    // Load Video Albums
    async function loadAlbums() {
      try {
        const snapshot = await db.collection("albums")
          .where("type", "==", "videos")
          .orderBy("createdAt", "desc")
          .get();
        
        if (snapshot.empty) {
          albumsGrid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>لا توجد ألبومات فيديو بعد</p></div>`;
          return;
        }
        
        let html = "";
        snapshot.forEach(doc => {
          const album = { id: doc.id, ...doc.data() };
          const date = album.createdAt?.toDate ? new Date(album.createdAt.toDate()).toLocaleDateString("ar-EG") : "";
          html += `
            <div class="album-card" data-aos="fade-up" data-album-id="${album.id}" data-album-name="${album.name}" data-album-desc="${album.description || ''}">
              <div class="album-cover" style="background-image: url('${album.coverImage || 'https://via.placeholder.com/400x200/0f2d5c/white?text=ألبوم+فيديو'}');">
                <div class="album-stats">🎬 ${album.videoCount || 0} فيديو</div>
              </div>
              <div class="album-info">
                <h3>${album.name}</h3>
                <p>${album.description || "لا يوجد وصف"}</p>
                <div class="album-date">📅 ${date}</div>
              </div>
            </div>
          `;
        });
        albumsGrid.innerHTML = html;
        
        // Add click events to album cards
        document.querySelectorAll('.album-card').forEach(card => {
          card.addEventListener('click', () => {
            const albumId = card.dataset.albumId;
            const albumName = card.dataset.albumName;
            const albumDesc = card.dataset.albumDesc;
            showAlbumVideos(albumId, albumName, albumDesc);
          });
        });
      } catch (error) {
        console.error("Error loading albums:", error);
        albumsGrid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>حدث خطأ في تحميل الألبومات</p></div>`;
        showToast("حدث خطأ في تحميل الألبومات", "error");
      }
    }

    // Load Videos of an Album
    async function showAlbumVideos(albumId, albumName, albumDesc) {
      currentAlbum = { id: albumId, name: albumName, description: albumDesc };
      
      albumHeader.innerHTML = `
        <h2>🎬 ${albumName}</h2>
        <p>${albumDesc || "استمتع بمشاهدة الفيديوهات"}</p>
      `;
      
      videosGrid.innerHTML = `<div class="loading-text"><div class="loading-spinner"></div> جاري تحميل الفيديوهات...</div>`;
      
      try {
        const snapshot = await db.collection("album_videos")
          .where("albumId", "==", albumId)
          .orderBy("createdAt", "desc")
          .get();
        
        if (snapshot.empty) {
          videosGrid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>لا توجد فيديوهات في هذا الألبوم بعد</p></div>`;
        } else {
          let html = "";
          snapshot.forEach(doc => {
            const video = { id: doc.id, ...doc.data() };
            const embedUrl = getYouTubeEmbedUrl(video.videoUrl);
            const date = video.createdAt?.toDate ? new Date(video.createdAt.toDate()).toLocaleDateString("ar-EG") : "";
            html += `
              <div class="video-card" data-aos="zoom-in">
                <iframe class="video-iframe" src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
                <div class="video-info">
                  <h4>${video.title || "بدون عنوان"}</h4>
                  <p>${video.description || ""}</p>
                  <div class="video-date">📅 ${date}</div>
                </div>
              </div>
            `;
          });
          videosGrid.innerHTML = html;
        }
        
        // Switch views
        albumsView.style.display = "none";
        videosView.style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
        
      } catch (error) {
        console.error("Error loading videos:", error);
        videosGrid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>حدث خطأ في تحميل الفيديوهات</p></div>`;
        showToast("حدث خطأ في تحميل الفيديوهات", "error");
      }
    }

    // Back to Albums
    function backToAlbums() {
      albumsView.style.display = "block";
      videosView.style.display = "none";
      currentAlbum = null;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // Event Listeners
    document.getElementById("backToAlbumsBtn").addEventListener("click", backToAlbums);

    // AOS
    AOS.init({
      duration: 800,
      once: true,
      offset: 100
    });

    // Header Scroll Effect
    window.addEventListener('scroll', () => {
      const header = document.querySelector('header');
      header.classList.toggle('scrolled', window.scrollY > 50);
    });

    // Load Albums on page load
    loadAlbums();
  </script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>
</html>
