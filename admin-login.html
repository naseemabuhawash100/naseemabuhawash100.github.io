<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الأدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', Arial, sans-serif;
    direction: rtl;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: white; border-radius: 24px; padding: 40px 36px;
    width: 100%; max-width: 420px; box-shadow: 0 24px 48px rgba(0,0,0,0.25);
  }
  .logo-area { text-align: center; margin-bottom: 28px; }
  .logo-area h1 { font-size: 26px; font-weight: 800; color: #1e3a8a; margin-bottom: 6px; }
  .logo-area p { font-size: 14px; color: #64748b; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
  .field input {
    width: 100%; padding: 13px 16px; border: 1.5px solid #d1d5db; border-radius: 14px;
    font-size: 15px; font-family: 'Tajawal', Arial, sans-serif; outline: none;
    transition: border-color .2s, box-shadow .2s; background: #f9fafb;
  }
  .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); background: white; }
  .btn-login {
    width: 100%; padding: 14px; background: #1e3a8a; color: white; border: none;
    border-radius: 14px; font-size: 17px; font-weight: 700;
    font-family: 'Tajawal', Arial, sans-serif; cursor: pointer; margin-top: 8px;
    transition: background .2s, transform .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login:hover:not(:disabled) { background: #1e40af; }
  .btn-login:active:not(:disabled) { transform: scale(0.98); }
  .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }
  .spinner {
    width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.4);
    border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #msgBox {
    margin-top: 14px; padding: 12px 14px; border-radius: 12px;
    font-size: 14px; font-weight: 600; text-align: center; display: none;
  }
  .error-box { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
  .success-box { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
  .back-link {
    display: block; text-align: center; color: #6b7280; font-size: 14px;
    text-decoration: none; padding: 8px; border-radius: 10px;
    transition: color .2s, background .2s; margin-top: 18px;
  }
  .back-link:hover { color: #1e3a8a; background: #f1f5f9; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div style="font-size:40px;margin-bottom:10px;">🔐</div>
    <h1>دخول الأدمن</h1>
    <p>النظام الرئيسي لإدارة جميع الروضات</p>
  </div>
  <div class="field">
    <label for="email">البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="password">كلمة المرور</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="loginBtn" onclick="login()">
    <span id="btnText">تسجيل الدخول</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div id="msgBox"></div>
  <a href="talaea-almobdeeen.html" class="back-link">← العودة إلى صفحة الروضة</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
  authDomain: "interactive-book-37270.firebaseapp.com",
  projectId: "interactive-book-37270",
  storageBucket: "interactive-book-37270.firebasestorage.app",
  messagingSenderId: "350364566140",
  appId: "1:350364566140:web:7997fb848a9b512f6b7ff9"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function showMsg(msg, type) {
  const el = document.getElementById("msgBox");
  el.textContent = msg;
  el.className = type === "success" ? "success-box" : "error-box";
  el.style.display = "block";
}
function setLoading(on) {
  document.getElementById("loginBtn").disabled = on;
  document.getElementById("btnText").textContent = on ? "جاري التحقق..." : "تسجيل الدخول";
  document.getElementById("spinner").style.display = on ? "block" : "none";
}
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  document.getElementById("msgBox").style.display = "none";
  if (!email || !password) { showMsg("يرجى إدخال البريد الإلكتروني وكلمة المرور", "error"); return; }
  setLoading(true);
  try {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const doc = await db.collection("users").doc(cred.user.uid).get();
    if (!doc.exists) { await auth.signOut(); showMsg("المستخدم غير موجود في النظام", "error"); setLoading(false); return; }
    const data = doc.data();
    if (data.role !== "admin") { await auth.signOut(); showMsg("ليس لديك صلاحية الأدمن", "error"); setLoading(false); return; }
    if (data.isActive !== true) { await auth.signOut(); showMsg("الحساب غير مفعل، تواصل مع الدعم", "error"); setLoading(false); return; }
    showMsg("تم التحقق بنجاح... جاري الانتقال ✓", "success");
    setTimeout(() => { window.location.href = "admin-data-manager.html"; }, 700);
  } catch (error) {
    setLoading(false);
    const c = error.code || "";
    if (c === "auth/user-not-found" || c === "auth/wrong-password" || c === "auth/invalid-credential" || c === "auth/invalid-login-credentials") {
      showMsg("البريد الإلكتروني أو كلمة المرور غير صحيحة", "error");
    } else if (c === "auth/invalid-email") {
      showMsg("صيغة البريد الإلكتروني غير صحيحة", "error");
    } else if (c === "auth/too-many-requests") {
      showMsg("تم تجاوز عدد المحاولات المسموح بها، حاول لاحقاً", "error");
    } else {
      showMsg("خطأ في تسجيل الدخول: " + (error.message || c), "error");
    }
  }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
