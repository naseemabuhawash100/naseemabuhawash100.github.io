<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عارض التمرين</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
    }
    .hero-gradient {
      background: linear-gradient(135deg, #1e3a8a 0%, #334155 100%);
    }
    iframe {
      width: 100%;
      min-height: 900px;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body class="min-h-screen text-right">
  <header class="sticky top-0 z-40 bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
      <div>
        <h1 id="pageTitle" class="text-2xl font-extrabold text-blue-900">عارض التمرين</h1>
        <p id="pageSubtitle" class="text-sm text-slate-600 mt-1">جاري تحميل بيانات الصفحة...</p>
      </div>
      <div class="flex flex-wrap gap-3">
        <a href="exercises.html" class="bg-slate-200 text-slate-800 px-5 py-2.5 rounded-full font-medium hover:bg-slate-300 transition">
          العودة للتمارين
        </a>
        <a href="kindergarten-home.html" class="bg-blue-900 text-white px-5 py-2.5 rounded-full font-medium hover:bg-blue-800 transition">
          صفحة الروضة
        </a>
      </div>
    </div>
  </header>

  <section class="hero-gradient text-white py-10">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <h2 id="heroTitle" class="text-3xl md:text-4xl font-extrabold mb-4">التمرين التفاعلي</h2>
      <p id="heroText" class="text-base md:text-lg opacity-90 leading-8">
        يتم هنا عرض التمرين مع ملفاته وصوره بشكل مباشر باستخدام الروابط الحقيقية.
      </p>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
      <h3 class="text-2xl font-bold text-blue-900 mb-5 text-center">بيانات الطالب</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block mb-2 font-medium text-slate-700">اسم الطالب</label>
          <input id="studentName" type="text" placeholder="اكتب اسم الطالب" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none focus:ring-2 focus:ring-blue-200">
        </div>
        <div>
          <label class="block mb-2 font-medium text-slate-700">كود الطالب</label>
          <input id="studentCode" type="text" placeholder="اكتب كود الطالب" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none focus:ring-2 focus:ring-blue-200">
        </div>
        <div>
          <label class="block mb-2 font-medium text-slate-700">الشعبة / الصف</label>
          <input id="className" type="text" placeholder="مثال: التمهيدي A" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none focus:ring-2 focus:ring-blue-200">
        </div>
      </div>
      <p id="studentMsg" class="mt-4 text-center font-medium text-slate-700"></p>
    </section>

    <section id="statusBox" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 text-center">
      <p id="statusText" class="text-lg font-bold text-slate-700">جاري تحميل التمرين...</p>
    </section>

    <section id="playerBox" class="hidden mt-6">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <iframe id="exerciseFrame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
      </div>
    </section>

    <section id="resultBox" class="hidden mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 text-center">
      <h3 class="text-2xl font-bold text-blue-900 mb-4">نتيجة الطالب</h3>
      <p id="resultText" class="text-xl font-bold text-slate-800"></p>
      <p id="saveStatus" class="mt-4 font-medium text-slate-700"></p>
    </section>
  </main>

  <script>
    (function () {
      const firebaseConfig = {
        apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
        authDomain: "interactive-book-37270.firebaseapp.com",
        projectId: "interactive-book-37270",
        storageBucket: "interactive-book-37270.appspot.com",
        messagingSenderId: "350364566140",
        appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
        measurementId: "G-QM0TNEN9XJ"
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const familyKindergarten = sessionStorage.getItem("familyKindergarten");
      if (!familyKindergarten) {
        window.location.href = "kindergartens.html";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const stage = params.get("stage") || "";
      const subject = params.get("subject") || "";
      const page = params.get("page") || "";

      const pageTitle = document.getElementById("pageTitle");
      const pageSubtitle = document.getElementById("pageSubtitle");
      const heroTitle = document.getElementById("heroTitle");
      const statusBox = document.getElementById("statusBox");
      const statusText = document.getElementById("statusText");
      const playerBox = document.getElementById("playerBox");
      const frame = document.getElementById("exerciseFrame");
      const resultBox = document.getElementById("resultBox");
      const resultText = document.getElementById("resultText");
      const saveStatus = document.getElementById("saveStatus");
      const studentMsg = document.getElementById("studentMsg");

      let currentKindergarten = null;
      let currentExerciseTitle = "";
      let allowedStudents = {};
      let resultSaved = false;

      function stageLabel(v) {
        return v === "tamheedi" ? "التمهيدي" : v === "tahdiri" ? "التحضيري" : v;
      }

      function subjectLabel(v) {
        return v === "math" ? "الرياضيات" : v === "arabic" ? "العربي" : v === "english" ? "الإنجليزي" : v;
      }

      function padPage(value) {
        return String(value || "").padStart(2, "0");
      }

      function getDocId(kindergartenId, stageValue, subjectValue, pageValue) {
        return `${kindergartenId}__${stageValue}__${subjectValue}__p${padPage(pageValue)}`;
      }

      function normalizeArabicName(name) {
        return String(name || "")
          .trim()
          .replace(/[أإآ]/g, "ا")
          .replace(/ى/g, "ي")
          .replace(/ة/g, "ه")
          .replace(/\s+/g, " ")
          .toLowerCase();
      }

      function getTodayDateOnly() {
        return new Date().toISOString().slice(0, 10);
      }

      function helperScriptBlock() {
        return `
<script>
window.completeExercise = function(score, total, extraData) {
  window.parent.postMessage({
    type: "exerciseResult",
    score: Number(score || 0),
    total: Number(total || 0),
    extraData: extraData || {}
  }, "*");
};
<\/script>`;
      }

      async function fetchText(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("تعذر قراءة الملف: " + url);
        }
        return await response.text();
      }

      function escapeRegExp(str) {
        return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function getBaseUrl(fileUrl) {
        if (!fileUrl) return "";
        const i = fileUrl.lastIndexOf("/");
        return i === -1 ? "" : fileUrl.slice(0, i + 1);
      }

      function buildImageMap(images) {
        const map = {};

        (images || []).forEach((img) => {
          if (!img || !img.url) return;

          const name = String(img.name || "").trim();
          const path = String(img.path || "").trim().replace(/^\/+/, "");

          const keys = new Set();

          if (name) {
            keys.add(name);
            keys.add("./" + name);
            keys.add("/" + name);
            keys.add("images/" + name);
            keys.add("./images/" + name);
            keys.add("/images/" + name);
          }

          if (path) {
            keys.add(path);
            keys.add("./" + path);
            keys.add("/" + path);

            const parts = path.split("/");
            const lastPart = parts[parts.length - 1];
            if (lastPart) {
              keys.add(lastPart);
              keys.add("./" + lastPart);
              keys.add("/" + lastPart);
              keys.add("images/" + lastPart);
              keys.add("./images/" + lastPart);
              keys.add("/images/" + lastPart);
            }

            const imagesIndex = parts.findIndex(part => part === "images");
            if (imagesIndex !== -1) {
              const fromImages = parts.slice(imagesIndex).join("/");
              keys.add(fromImages);
              keys.add("./" + fromImages);
              keys.add("/" + fromImages);
            }
          }

          keys.forEach(key => {
            map[key] = img.url;
          });
        });

        return map;
      }

      function replaceKnownPaths(text, imageMap) {
        let updated = String(text || "");
        Object.entries(imageMap || {}).forEach(([key, value]) => {
          updated = updated.replace(new RegExp(escapeRegExp(key), "g"), value);
        });
        return updated;
      }

      function buildResolverScript(imageMap) {
        const imageJson = JSON.stringify(imageMap || {});
        return `
<script>
(function() {
  const IMAGE_MAP = ${imageJson};

  function resolveAsset(path) {
    if (!path || typeof path !== "string") return path;
    if (IMAGE_MAP[path]) return IMAGE_MAP[path];

    const cleaned = path
      .replace(/^\\.\\//, "")
      .replace(/^\\//, "")
      .replace(/^https?:\\/\\/[^/]+\\//, "");

    if (IMAGE_MAP[cleaned]) return IMAGE_MAP[cleaned];
    if (IMAGE_MAP["./" + cleaned]) return IMAGE_MAP["./" + cleaned];
    if (IMAGE_MAP["/" + cleaned]) return IMAGE_MAP["/" + cleaned];

    const last = cleaned.split("/").pop();
    if (last && IMAGE_MAP[last]) return IMAGE_MAP[last];
    if (last && IMAGE_MAP["images/" + last]) return IMAGE_MAP["images/" + last];
    return path;
  }

  const originalSetAttribute = Element.prototype.setAttribute;
  Element.prototype.setAttribute = function(name, value) {
    if ((name === "src" || name === "href") && typeof value === "string") {
      value = resolveAsset(value);
    }

    if (name === "style" && typeof value === "string") {
      Object.keys(IMAGE_MAP).forEach((key) => {
        value = value.split(key).join(IMAGE_MAP[key]);
      });
    }

    return originalSetAttribute.call(this, name, value);
  };

  const imgSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
  if (imgSrc && imgSrc.set) {
    Object.defineProperty(HTMLImageElement.prototype, "src", {
      get: imgSrc.get,
      set: function(value) {
        return imgSrc.set.call(this, resolveAsset(value));
      }
    });
  }

  const originalFetch = window.fetch;
  window.fetch = function(resource, init) {
    if (typeof resource === "string") {
      resource = resolveAsset(resource);
    }
    return originalFetch.call(this, resource, init);
  };

  function patchImages(root) {
    if (!root || !root.querySelectorAll) return;

    root.querySelectorAll("img, source").forEach((el) => {
      const src = el.getAttribute("src");
      if (src) el.setAttribute("src", resolveAsset(src));
    });

    root.querySelectorAll("[style]").forEach((el) => {
      let style = el.getAttribute("style");
      if (!style) return;
      Object.keys(IMAGE_MAP).forEach((key) => {
        style = style.split(key).join(IMAGE_MAP[key]);
      });
      el.setAttribute("style", style);
    });
  }

  document.addEventListener("DOMContentLoaded", function() {
    patchImages(document);

    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
          if (node.nodeType === 1) patchImages(node);
        });
      });
    });

    observer.observe(document.body, { childList: true, subtree: true });
  });
})();
<\/script>`;
      }

      function buildDirectHtml(code, title) {
        const trimmed = String(code || "").trim();
        if (!trimmed) return "";

        const helper = helperScriptBlock();

        if (/<html|<head|<body/i.test(trimmed)) {
          if (/<\/body>/i.test(trimmed)) {
            return trimmed.replace(/<\/body>/i, helper + "\n</body>");
          }
          return trimmed + helper;
        }

        return `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${title || "تمرين تفاعلي"}</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; direction: rtl; background: #f8fafc; margin: 0; padding: 24px; }
  </style>
</head>
<body>
  ${trimmed}
  ${helper}
</body>
</html>`;
      }

      async function buildFilesHtml(pageData) {
        const htmlUrl = pageData?.files?.html?.url || "";
        if (!htmlUrl) return "";

        let htmlText = await fetchText(htmlUrl);
        let cssText = pageData?.files?.css?.url ? await fetchText(pageData.files.css.url) : "";
        let jsText = pageData?.files?.js?.url ? await fetchText(pageData.files.js.url) : "";

        const imageMap = buildImageMap(pageData.images || []);
        const baseUrl = getBaseUrl(htmlUrl);

        htmlText = htmlText.replace(/<link[^>]+href=["'][^"']+\.css["'][^>]*>/gi, "");
        htmlText = htmlText.replace(/<script[^>]+src=["'][^"']+\.js["'][^>]*>\s*<\/script>/gi, "");

        htmlText = replaceKnownPaths(htmlText, imageMap);
        cssText = replaceKnownPaths(cssText, imageMap);
        jsText = replaceKnownPaths(jsText, imageMap);

        const headExtra = `
  <base href="${baseUrl}">
  <script src="https://cdn.tailwindcss.com"><\/script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Tajawal',Arial,sans-serif;direction:rtl;}</style>
  ${cssText ? `<style>${cssText}<\/style>` : ""}
  ${buildResolverScript(imageMap)}
`;

        const bodyExtra = `
${helperScriptBlock()}
${jsText ? `<script>${jsText}<\/script>` : ""}
`;

        let finalHtml = htmlText;

        if (/<\/head>/i.test(finalHtml)) {
          finalHtml = finalHtml.replace(/<\/head>/i, headExtra + "\n</head>");
        } else {
          finalHtml = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  ${headExtra}
</head>
<body>
  ${finalHtml}
</body>
</html>`;
        }

        if (/<\/body>/i.test(finalHtml)) {
          finalHtml = finalHtml.replace(/<\/body>/i, bodyExtra + "\n</body>");
        } else {
          finalHtml += bodyExtra;
        }

        return finalHtml;
      }

      function studentInputs() {
        return {
          studentName: document.getElementById("studentName").value.trim(),
          studentCode: document.getElementById("studentCode").value.trim().toUpperCase(),
          className: document.getElementById("className").value.trim()
        };
      }

      function autofillStudentByCode() {
        const code = document.getElementById("studentCode").value.trim().toUpperCase();
        if (!code || !allowedStudents[code]) return;

        document.getElementById("studentName").value = allowedStudents[code].name || "";
        if (!document.getElementById("className").value && allowedStudents[code].className) {
          document.getElementById("className").value = allowedStudents[code].className || "";
        }
      }

      async function loadStudents() {
        const studentsSnap = await db.collection("students")
          .where("kindergartenId", "==", familyKindergarten)
          .get();

        allowedStudents = {};
        studentsSnap.forEach((doc) => {
          const s = doc.data();
          allowedStudents[String(s.code || "").toUpperCase()] = {
            name: s.name || "",
            className: s.className || ""
          };
        });
      }

      async function saveResult(score, total, extraData) {
        if (resultSaved) return;

        const inputs = studentInputs();
        studentMsg.textContent = "";
        saveStatus.textContent = "";

        if (!inputs.studentName) {
          studentMsg.textContent = "يرجى كتابة اسم الطالب أولًا";
          studentMsg.className = "mt-4 text-center font-medium text-red-600";
          return;
        }

        if (!inputs.studentCode) {
          studentMsg.textContent = "يرجى إدخال كود الطالب أولًا";
          studentMsg.className = "mt-4 text-center font-medium text-red-600";
          return;
        }

        if (!allowedStudents[inputs.studentCode]) {
          studentMsg.textContent = "هذا الكود غير معتمد لهذه الروضة";
          studentMsg.className = "mt-4 text-center font-medium text-red-600";
          return;
        }

        if (normalizeArabicName(inputs.studentName) !== normalizeArabicName(allowedStudents[inputs.studentCode].name)) {
          studentMsg.textContent = "الاسم لا يطابق الكود الخاص بهذا الطالب";
          studentMsg.className = "mt-4 text-center font-medium text-red-600";
          return;
        }

        const today = getTodayDateOnly();
        saveStatus.textContent = "جاري حفظ النتيجة...";

        try {
          const existing = await db.collection("results")
            .where("kindergarten", "==", familyKindergarten)
            .where("stage", "==", stage)
            .where("subject", "==", subject)
            .where("pageNumber", "==", Number(page))
            .where("studentCode", "==", inputs.studentCode)
            .where("dateOnly", "==", today)
            .get();

          if (!existing.empty) {
            saveStatus.textContent = "تم تسجيل نتيجة هذا الطالب لهذه الصفحة اليوم بالفعل";
            saveStatus.className = "mt-4 font-medium text-red-600";
            resultSaved = true;
            return;
          }

          await db.collection("results").add({
            studentName: inputs.studentName,
            studentCode: inputs.studentCode,
            className: inputs.className || allowedStudents[inputs.studentCode].className || "",
            score: Number(score || 0),
            total: Number(total || 0),
            exerciseTitle: currentExerciseTitle || "",
            kindergarten: familyKindergarten,
            kindergartenName: currentKindergarten ? currentKindergarten.name : "",
            stage: stage,
            subject: subject,
            pageNumber: Number(page),
            createdAt: new Date().toISOString(),
            dateOnly: today,
            extraData: extraData || {}
          });

          saveStatus.textContent = "تم حفظ النتيجة بنجاح";
          saveStatus.className = "mt-4 font-medium text-green-600";
          resultSaved = true;
        } catch (error) {
          console.error(error);
          saveStatus.textContent = "حدث خطأ أثناء حفظ النتيجة";
          saveStatus.className = "mt-4 font-medium text-red-600";
        }
      }

      async function loadExercise() {
        try {
          if (!stage || !subject || !page) {
            statusText.textContent = "بيانات الصفحة غير مكتملة";
            return;
          }

          const kgSnap = await db.collection("kindergartens").doc(familyKindergarten).get();
          if (!kgSnap.exists) {
            window.location.href = "kindergartens.html";
            return;
          }

          currentKindergarten = kgSnap.data();

          pageTitle.textContent = "تمرين " + (currentKindergarten.name || "");
          pageSubtitle.textContent = `${stageLabel(stage)} - ${subjectLabel(subject)} - صفحة ${page}`;
          heroTitle.textContent = `${currentKindergarten.name || "الروضة"} | ${subjectLabel(subject)}`;

          await loadStudents();

          const docId = getDocId(familyKindergarten, stage, subject, page);
          const pageSnap = await db.collection("interactive_pages").doc(docId).get();

          if (!pageSnap.exists) {
            statusText.textContent = "لا يوجد تمرين محفوظ لهذه الصفحة بعد";
            return;
          }

          const data = pageSnap.data();
          currentExerciseTitle = data.title || "تمرين تفاعلي";

          let finalHtml = "";

          if (data.uploadMode === "files" && data.files && data.files.html && data.files.html.url) {
            finalHtml = await buildFilesHtml(data);
          } else if (data.code && String(data.code).trim()) {
            finalHtml = buildDirectHtml(data.code, currentExerciseTitle);
          } else {
            statusText.textContent = "هذه الصفحة موجودة ولكن لا تحتوي ملفات قابلة للعرض";
            return;
          }

          if (!finalHtml) {
            statusText.textContent = "تعذر تجهيز التمرين للعرض";
            return;
          }

          frame.srcdoc = finalHtml;
          statusBox.classList.add("hidden");
          playerBox.classList.remove("hidden");
        } catch (error) {
          console.error(error);
          statusText.textContent = "حدث خطأ أثناء تحميل التمرين";
        }
      }

      document.getElementById("studentCode").addEventListener("input", autofillStudentByCode);

      window.addEventListener("message", function(event) {
        if (!event.data || event.data.type !== "exerciseResult") return;

        const score = Number(event.data.score || 0);
        const total = Number(event.data.total || 0);

        resultText.textContent = `النتيجة: ${score} / ${total}`;
        resultBox.classList.remove("hidden");
        saveResult(score, total, event.data.extraData || {});
      });

      loadExercise();
    })();
  </script>
</body>
</html>
