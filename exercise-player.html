  <script>

    const firebaseConfig = {

    const params = new URLSearchParams(window.location.search);

    const statusText = document.getElementById("statusText");

    let currentKindergarten = null;

    let resultSaved = false;

    function stageLabel(v) {
      return v === "tamheedi" ? "التمهيدي" : v === "tahdiri" ? "التحضيري" : v;
    }
    function subjectLabel(v) {
      return v === "math" ? "الرياضيات" : v === "arabic" ? "العربي" : v === "english" ? "الإنجليزي" : v;
    }
    function pageDocId(k, s, sub, p) {
      return k + "__" + s + "__" + sub + "__p" + String(p).padStart(2, "0");
    }
    function normalizeArabicName(name) {
      return String(name || "")
        .trim()
        .replace(/[أإآ]/g, "ا")
        .replace(/ى/g, "ي")
        .replace(/ة/g, "ه")
        .replace(/\s+/g, " ")
        .toLowerCase();
    }
    function getTodayDateOnly() {
      return new Date().toISOString().slice(0, 10);
    }
    function helperScriptBlock() {
      return "<script>window.completeExercise=function(score,total,extraData){window.parent.postMessage({type:'exerciseResult',score:Number(score||0),total:Number(total||0),extraData:extraData||{}},'*');};<\/script>";
    }
    function buildDirectHtml(code, title) {
      const trimmed = String(code || "").trim();
      if (!trimmed) return "";
      const helper = helperScriptBlock();
      const lower = trimmed.toLowerCase();
      if (lower.includes("<html") || lower.includes("<body") || lower.includes("<head")) {
        return trimmed.replace("</body>", helper + "\n</body>");
      }
      return "<!DOCTYPE html><html lang='ar' dir='rtl'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>" +
        (title || "تمرين تفاعلي") +
        "</title><script src='https://cdn.tailwindcss.com'><\/script><link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap' rel='stylesheet'><style>body{font-family:Tajawal,Arial,sans-serif;direction:rtl;background:#f8fafc;margin:0;padding:24px;}</style></head><body>" +
        trimmed + helper + "</body></html>";
    }
    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("تعذر قراءة الملف: " + url);
      return await res.text();
    }
    function escapeRegExp(str) {
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }
    function buildImageMap(images) {
      const map = {};
      (images || []).forEach((img) => {
        if (!img || !img.url) return;

        const rawName = String(img.name || "").trim();
        const rawPath = String(img.path || "").trim();
        const fileName = String((rawName || rawPath).split("/").pop() || "").trim();

        const candidates = [
          rawName,
          rawPath,
          fileName,
          "images/" + rawName,
          "images/" + rawPath,
          "images/" + fileName,
          "./images/" + rawName,
          "./images/" + rawPath,
          "./images/" + fileName,
          "/images/" + rawName,
          "/images/" + rawPath,
          "/images/" + fileName,
          "./" + rawName,
          "./" + rawPath,
          "./" + fileName,
          "/" + rawName,
          "/" + rawPath,
          "/" + fileName
        ];

        candidates.forEach((name) => {
          if (!name) return;
          const normalized = String(name)
            .replace(/\/g, "/")
            .replace(/^\.?\//, "")
            .trim()
            .toLowerCase();
          if (normalized) map[normalized] = img.url;
        });
      });
      return map;
    });
      return map;
    }
    function replaceTextPaths(text, imageMap) {
      let updated = String(text || "");
      const entries = Object.entries(imageMap || {}).sort((a, b) => b[0].length - a[0].length);
      entries.forEach(([key, url]) => {
        const safe = escapeRegExp(key);
        updated = updated.replace(new RegExp(`(["'\\`])${safe}(["'\\`])`, "gi"), `$1${url}$2`);
        updated = updated.replace(new RegExp(`(["'\\`])\./${safe}(["'\\`])`, "gi"), `$1${url}$2`);
        updated = updated.replace(new RegExp(`(["'\\`])/+${safe}(["'\\`])`, "gi"), `$1${url}$2`);
        updated = updated.replace(new RegExp(`url\((\s*["']?)${safe}(["']?\s*)\)`, "gi"), `url($1${url}$2)`);
        updated = updated.replace(new RegExp(`url\((\s*["']?)\./${safe}(["']?\s*)\)`, "gi"), `url($1${url}$2)`);
        updated = updated.replace(new RegExp(`url\((\s*["']?)/+${safe}(["']?\s*)\)`, "gi"), `url($1${url}$2)`);
      });
      return updated;
    });
      return updated;
    }
    function buildRuntimeImageResolver(imageMap) {
      const json = JSON.stringify(imageMap || {});
      return `
<script>
(function(){
  const IMAGE_MAP = ${json};

  function normalizeKey(path){
    if(!path) return "";
    return String(path)
      .replace(/\\/g, "/")
      .replace(/^https?:\/\/[^/]+\//i, "")
      .replace(/^\.\//, "")
      .replace(/^\//, "")
      .trim()
      .toLowerCase();
  }

  function resolveAsset(path){
    if(!path) return path;
    const key = normalizeKey(path);
    return IMAGE_MAP[key] || path;
  }

  window.__resolveExerciseAsset = resolveAsset;

  const originalSetAttribute = Element.prototype.setAttribute;
  Element.prototype.setAttribute = function(name, value){
    const attr = String(name || "").toLowerCase();
    if(attr === "src" || attr === "href" || attr === "poster" || attr === "data-src"){
      value = resolveAsset(value);
    }
    if(attr === "style" && typeof value === "string"){
      value = value.replace(/url\((['"]?)(.*?)\1\)/gi, function(match, q, inner){
        return "url(" + (q || "") + resolveAsset(inner) + (q || "") + ")";
      });
    }
    return originalSetAttribute.call(this, name, value);
  };

  const imgSrcDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
  if(imgSrcDesc && imgSrcDesc.set){
    Object.defineProperty(HTMLImageElement.prototype, "src", {
      get: function(){ return imgSrcDesc.get.call(this); },
      set: function(value){ return imgSrcDesc.set.call(this, resolveAsset(value)); }
    });
  }

  const originalFetch = window.fetch;
  if (originalFetch) {
    window.fetch = function(resource, init){
      if(typeof resource === "string"){
        resource = resolveAsset(resource);
      } else if(resource instanceof Request) {
        resource = new Request(resolveAsset(resource.url), resource);
      }
      return originalFetch.call(this, resource, init);
    };
  }

  const originalXHROpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url){
    const args = Array.from(arguments);
    if(typeof url === "string") args[1] = resolveAsset(url);
    return originalXHROpen.apply(this, args);
  };

  function patchNodeImages(root){
    if(!root) return;

    if(root.nodeType === 1){
      ["src","href","poster","data-src"].forEach(function(attr){
        const val = root.getAttribute && root.getAttribute(attr);
        if(val){
          const resolved = resolveAsset(val);
          if(resolved !== val) root.setAttribute(attr, resolved);
        }
      });
      if(root.style && root.style.backgroundImage){
        root.style.backgroundImage = root.style.backgroundImage.replace(/url\((['"]?)(.*?)\1\)/gi, function(match, q, inner){
          return "url(" + (q || "") + resolveAsset(inner) + (q || "") + ")";
        });
      }
    }

    if(root.querySelectorAll){
      root.querySelectorAll("*").forEach(function(el){
        ["src","href","poster","data-src"].forEach(function(attr){
          const val = el.getAttribute(attr);
          if(val){
            const resolved = resolveAsset(val);
            if(resolved !== val) el.setAttribute(attr, resolved);
          }
        });
        if(el.style && el.style.backgroundImage){
          el.style.backgroundImage = el.style.backgroundImage.replace(/url\((['"]?)(.*?)\1\)/gi, function(match, q, inner){
            return "url(" + (q || "") + resolveAsset(inner) + (q || "") + ")";
          });
        }
      });
    }
  }

  const observer = new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(node){
        patchNodeImages(node);
      });
      if(m.type === "attributes" && m.target){
        patchNodeImages(m.target);
      }
    });
  });

  document.addEventListener("DOMContentLoaded", function(){
    patchNodeImages(document.documentElement);
    observer.observe(document.documentElement, {
      childList:true,
      subtree:true,
      attributes:true,
      attributeFilter:["src","href","poster","data-src","style"]
    });
  });

  window.addEventListener("load", function(){
    patchNodeImages(document.documentElement);
  });
})();
<\/script>`;
    }

  window.__resolveExerciseAsset = normalizePath;

  const originalSetAttribute = Element.prototype.setAttribute;
  Element.prototype.setAttribute = function(name, value){
    if(name === 'src' || name === 'href'){
      value = normalizePath(value);
    }
    if(name === 'style' && typeof value === 'string'){
      Object.keys(IMAGE_MAP).forEach(function(key){
        value = value.split(key).join(IMAGE_MAP[key]);
      });
    }
    return originalSetAttribute.call(this, name, value);
  };

  const imgSrcDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  if(imgSrcDesc && imgSrcDesc.set){
    Object.defineProperty(HTMLImageElement.prototype, 'src', {
      get: imgSrcDesc.get,
      set: function(value){
        return imgSrcDesc.set.call(this, normalizePath(value));
      }
    });
  }

  const sourceSrcDesc = Object.getOwnPropertyDescriptor(HTMLSourceElement.prototype, 'src');
  if(sourceSrcDesc && sourceSrcDesc.set){
    Object.defineProperty(HTMLSourceElement.prototype, 'src', {
      get: sourceSrcDesc.get,
      set: function(value){
        return sourceSrcDesc.set.call(this, normalizePath(value));
      }
    });
  }

  const originalFetch = window.fetch;
  window.fetch = function(resource, init){
    if(typeof resource === 'string'){
      resource = normalizePath(resource);
    } else if(resource && resource.url){
      resource = normalizePath(resource.url);
    }
    return originalFetch.call(this, resource, init);
  };

  const OriginalImage = window.Image;
  window.Image = function(width, height){
    const img = new OriginalImage(width, height);
    return img;
  };
  window.Image.prototype = OriginalImage.prototype;

  function patchNodeImages(root){
    if(!root || !root.querySelectorAll) return;
    root.querySelectorAll('img, source').forEach(function(el){
      const src = el.getAttribute('src');
      if(src){
        el.setAttribute('src', normalizePath(src));
      }
    });
    root.querySelectorAll('[style]').forEach(function(el){
      let style = el.getAttribute('style');
      if(style){
        Object.keys(IMAGE_MAP).forEach(function(key){
          style = style.split(key).join(IMAGE_MAP[key]);
        });
        el.setAttribute('style', style);
      }
    });
  }

  const observer = new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(node){
        if(node.nodeType === 1){
          patchNodeImages(node);
        }
      });
    });
  });

  document.addEventListener('DOMContentLoaded', function(){
    patchNodeImages(document);
    observer.observe(document.body, { childList:true, subtree:true });
  });

  window.addEventListener('load', function(){
    patchNodeImages(document);
  });
})();
<\/script>`;
    }

    async function buildFilesHtml(pageData) {
      const htmlUrl = pageData.files && pageData.files.html ? pageData.files.html.url : "";
      if (!htmlUrl) return "";
      let htmlText = await fetchText(htmlUrl);
      let cssText = pageData.files && pageData.files.css ? await fetchText(pageData.files.css.url) : "";
      let jsText = pageData.files && pageData.files.js ? await fetchText(pageData.files.js.url) : "";

      const imageMap = buildImageMap(pageData.images || []);

      htmlText = htmlText.replace(/<link[^>]+href=["'][^"']+\.css["'][^>]*>/gi, "");
      htmlText = htmlText.replace(/<script[^>]+src=["'][^"']+\.js["'][^>]*>\s*<\/script>/gi, "");

      htmlText = replaceTextPaths(htmlText, imageMap);
      cssText = replaceTextPaths(cssText, imageMap);
      jsText = replaceTextPaths(jsText, imageMap);

      let injectedHead = "";
      if (cssText) injectedHead += "<style>" + cssText + "<\/style>";
      injectedHead += "<script src='https://cdn.tailwindcss.com'><\/script>";
      injectedHead += "<link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap' rel='stylesheet'>";
      injectedHead += "<style>body{font-family:Tajawal,Arial,sans-serif;direction:rtl;}</style>";
      injectedHead += buildRuntimeImageResolver(imageMap);

      let injectedBeforeBodyEnd = helperScriptBlock();
      if (jsText) injectedBeforeBodyEnd += "<script>" + jsText + "<\/script>";

      let finalHtml = htmlText;
      if (finalHtml.toLowerCase().includes("</head>")) {
        finalHtml = finalHtml.replace(/<\/head>/i, injectedHead + "</head>");
      } else {
        finalHtml = "<!DOCTYPE html><html lang='ar' dir='rtl'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>" +
          injectedHead + "</head><body>" + finalHtml + "</body></html>";
      }

      if (finalHtml.toLowerCase().includes("</body>")) {
        finalHtml = finalHtml.replace(/<\/body>/i, injectedBeforeBodyEnd + "</body>");
      } else {
        finalHtml += injectedBeforeBodyEnd;
      }

      return finalHtml;
    }

    function studentInputs() {
      return {
        studentName: document.getElementById("studentName").value.trim(),
        studentCode: document.getElementById("studentCode").value.trim().toUpperCase(),
        className: document.getElementById("className").value.trim()
      };
    }
    function autofillStudentByCode() {
      const code = document.getElementById("studentCode").value.trim().toUpperCase();
      if (!code || !allowedStudents[code]) return;
      document.getElementById("studentName").value = allowedStudents[code].name || "";
      if (!document.getElementById("className").value && allowedStudents[code].className) {
        document.getElementById("className").value = allowedStudents[code].className;
      }
    }
    async function loadStudents() {
      const snap = await db.collection("students").where("kindergartenId", "==", familyKindergarten).get();
      allowedStudents = {};
      snap.forEach((doc) => {
        const s = doc.data();
        allowedStudents[String(s.code || "").toUpperCase()] = {
          name: s.name || "",
          className: s.className || ""
        };
      });
    }

    async function saveResult(score, total, extraData) {
      if (resultSaved) return;

      const inputs = studentInputs();
      studentMsg.innerText = "";
      saveStatus.innerText = "";

      if (!inputs.studentName) {
        studentMsg.innerText = "يرجى كتابة اسم الطالب أولًا";
        studentMsg.className = "mt-4 text-center font-medium text-red-600";
        return;
      }
      if (!inputs.studentCode) {
        studentMsg.innerText = "يرجى إدخال كود الطالب أولًا";
        studentMsg.className = "mt-4 text-center font-medium text-red-600";
        return;
      }
      if (!allowedStudents[inputs.studentCode]) {
        studentMsg.innerText = "هذا الكود غير معتمد لهذه الروضة";
        studentMsg.className = "mt-4 text-center font-medium text-red-600";
        return;
      }
      if (normalizeArabicName(inputs.studentName) !== normalizeArabicName(allowedStudents[inputs.studentCode].name)) {
        studentMsg.innerText = "الاسم لا يطابق الكود الخاص بهذا الطالب";
        studentMsg.className = "mt-4 text-center font-medium text-red-600";
        return;
      }

      const today = getTodayDateOnly();
      saveStatus.innerText = "جاري حفظ النتيجة...";

      try {
        const existing = await db.collection("results")
          .where("kindergarten", "==", familyKindergarten)
          .where("stage", "==", stage)
          .where("subject", "==", subject)
          .where("pageNumber", "==", Number(page))
          .where("studentCode", "==", inputs.studentCode)
          .where("dateOnly", "==", today)
          .get();

        if (!existing.empty) {
          saveStatus.innerText = "تم تسجيل نتيجة هذا الطالب لهذه الصفحة اليوم بالفعل";
          saveStatus.className = "mt-4 font-medium text-red-600";
          resultSaved = true;
          return;
        }

        await db.collection("results").add({
          studentName: inputs.studentName,
          studentCode: inputs.studentCode,
          className: inputs.className || allowedStudents[inputs.studentCode].className || "",
          score: Number(score || 0),
          total: Number(total || 0),
          exerciseTitle: currentExerciseTitle || "",
          kindergarten: familyKindergarten,
          kindergartenName: currentKindergarten ? currentKindergarten.name : "",
          stage: stage,
          subject: subject,
          pageNumber: Number(page),
          createdAt: new Date().toISOString(),
          dateOnly: today,
          extraData: extraData || {}
        });

        saveStatus.innerText = "تم إرسال النتيجة للمعلمة وحفظها بنجاح";
        saveStatus.className = "mt-4 font-medium text-green-600";
        resultSaved = true;
      } catch (error) {
        console.error(error);
        saveStatus.innerText = "حدث خطأ أثناء حفظ النتيجة";
        saveStatus.className = "mt-4 font-medium text-red-600";
      }
    }

    async function loadExercise() {
      try {
        if (!stage || !subject || !page) {
          statusText.innerText = "بيانات الصفحة غير مكتملة";
          return;
        }

        const kgSnap = await db.collection("kindergartens").doc(familyKindergarten).get();
        if (!kgSnap.exists) {
          window.location.href = "kindergartens.html";
          return;
        }

        currentKindergarten = kgSnap.data();
        document.getElementById("pageTitle").innerText = "تمرين " + currentKindergarten.name;
        document.getElementById("pageSubtitle").innerText = stageLabel(stage) + " - " + subjectLabel(subject) + " - صفحة " + page;
        document.getElementById("heroTitle").innerText = currentKindergarten.name + " | " + subjectLabel(subject);

        await loadStudents();

        const docId = pageDocId(familyKindergarten, stage, subject, page);
        const pageSnap = await db.collection("interactive_pages").doc(docId).get();
        if (!pageSnap.exists) {
          statusText.innerText = "لا يوجد تمرين محفوظ لهذه الصفحة بعد";
          return;
        }

        const data = pageSnap.data();
        currentExerciseTitle = data.title || "تمرين تفاعلي";

        let finalHtml = "";
        if (data.uploadMode === "files" && data.files && data.files.html && data.files.html.url) {
          finalHtml = await buildFilesHtml(data);
        } else if (data.uploadMode === "zip" && data.files && data.files.zip) {
          statusText.innerText = "تم رفع ملف ZIP، وسنضيف تشغيله لاحقًا. حاليًا استخدمي الملفات المنفصلة أو الكود المباشر.";
          return;
        } else if (data.code && String(data.code).trim()) {
          finalHtml = buildDirectHtml(data.code, currentExerciseTitle);
        }

        if (!finalHtml) {
          statusText.innerText = "هذه الصفحة موجودة ولكن لا تحتوي ملفات أو كودًا صالحًا للعرض";
          return;
        }

        frame.srcdoc = finalHtml;
        statusBox.classList.add("hidden");
        playerBox.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        statusText.innerText = "حدث خطأ أثناء تحميل التمرين";
      }
    }

    document.getElementById("studentCode").addEventListener("input", autofillStudentByCode);

    window.addEventListener("message", function(event) {
      if (!event.data || event.data.type !== "exerciseResult") return;
      const score = Number(event.data.score || 0);
      const total = Number(event.data.total || 0);
      resultText.innerText = "النتيجة: " + score + " / " + total;
      resultBox.classList.remove("hidden");
      saveResult(score, total, event.data.extraData || {});
    });

    loadExercise();
  })();
  </script>
</body>
</html>
