<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار التمرين</title>
</head>
<body style="font-family:Arial; text-align:center; padding:40px;">

  <h1>التمرين الأول</h1>

  <p>اكتب اسمك:</p>
  <input id="studentName" type="text" placeholder="اكتب اسمك">

  <p style="margin-top:30px;">2 + 3 = ؟</p>

  <label><input type="radio" name="q1" value="5"> 5</label><br>
  <label><input type="radio" name="q1" value="4"> 4</label><br>
  <label><input type="radio" name="q1" value="6"> 6</label><br><br>

  <button onclick="finishQuiz()">إنهاء التمرين</button>

  <p id="result" style="margin-top:20px; font-weight:bold;"></p>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCvMD5nCvSVsKtSMVfELNFLHXSv3LSi0",
      authDomain: "interactive-book-37270.firebaseapp.com",
      projectId: "interactive-book-37270",
      storageBucket: "interactive-book-37270.appspot.com",
      messagingSenderId: "350364566140",
      appId: "1:350364566140:web:7997fb848a9b512f6b7ff9",
      measurementId: "G-QM0TNEN9XJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function finishQuiz() {
      var name = document.getElementById("studentName").value.trim();
      var answer = document.querySelector('input[name="q1"]:checked');
      var result = document.getElementById("result");

      if (name === "") {
        result.innerText = "اكتب اسمك أولًا";
        return;
      }

      if (!answer) {
        result.innerText = "اختر إجابة أولًا";
        return;
      }

      var score = 0;
      if (answer.value === "5") {
        score = 1;
      }

      db.collection("results").add({
        studentName: name,
        score: score
      })
      .then(function () {
        if (score === 1) {
          result.innerText = name + "، إجابة صحيحة ✅ وتم حفظ النتيجة";
        } else {
          result.innerText = name + "، إجابة خاطئة ❌ وتم حفظ النتيجة";
        }
      })
      .catch(function (error) {
        result.innerText = "ظهرت النتيجة لكن صار خطأ في الحفظ";
        console.error(error);
      });
    }
  </script>

</body>
</html>
