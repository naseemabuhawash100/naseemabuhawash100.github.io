<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التمرين الأول</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-2xl text-center">
    <h1 class="text-3xl font-bold text-blue-900 mb-4">التمرين الأول</h1>
    <p class="text-gray-600 mb-6">اكتب اسمك ثم أجب عن جميع الأسئلة واضغط إنهاء التمرين</p>

    <input
      id="studentName"
      type="text"
      placeholder="اكتب اسم الطالب"
      class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-8 text-center"
    />

    <div class="text-right mb-8">
      <h2 class="text-xl font-bold mb-3">1) 2 + 3 = ؟</h2>
      <label class="block mb-2"><input type="radio" name="q1" value="5"> 5</label>
      <label class="block mb-2"><input type="radio" name="q1" value="4"> 4</label>
      <label class="block mb-2"><input type="radio" name="q1" value="6"> 6</label>
    </div>

    <div class="text-right mb-8">
      <h2 class="text-xl font-bold mb-3">2) 4 + 1 = ؟</h2>
      <label class="block mb-2"><input type="radio" name="q2" value="5"> 5</label>
      <label class="block mb-2"><input type="radio" name="q2" value="3"> 3</label>
      <label class="block mb-2"><input type="radio" name="q2" value="6"> 6</label>
    </div>

    <div class="text-right mb-8">
      <h2 class="text-xl font-bold mb-3">3) 1 + 2 = ؟</h2>
      <label class="block mb-2"><input type="radio" name="q3" value="3"> 3</label>
      <label class="block mb-2"><input type="radio" name="q3" value="2"> 2</label>
      <label class="block mb-2"><input type="radio" name="q3" value="4"> 4</label>
    </div>

    <button
      type="button"
      id="finishBtn"
      class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 transition"
    >
      إنهاء التمرين
    </button>

    <p id="result" class="mt-6 text-xl font-bold text-center"></p>

    <a href="grade1.html" class="block mt-6 text-red-600 font-bold hover:underline">
      رجوع
    </a>
  </div>

  <script>
    document.getElementById("finishBtn").addEventListener("click", function () {
      const resultElement = document.getElementById("result");
      const studentName = document.getElementById("studentName").value.trim();

      if (studentName === "") {
        resultElement.innerText = "اكتب اسمك أولًا";
        return;
      }

      const q1 = document.querySelector('input[name="q1"]:checked');
      const q2 = document.querySelector('input[name="q2"]:checked');
      const q3 = document.querySelector('input[name="q3"]:checked');

      if (!q1 || !q2 || !q3) {
        resultElement.innerText = "أجب عن جميع الأسئلة أولًا";
        return;
      }

      let score = 0;
      if (q1.value === "5") score++;
      if (q2.value === "5") score++;
      if (q3.value === "3") score++;

      resultElement.innerText = studentName + "، نتيجتك: " + score + " من 3 🎉";
    });
  </script>

</body>
</html>
