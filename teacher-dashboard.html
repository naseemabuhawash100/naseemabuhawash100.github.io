<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المعلمة</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; direction: rtl; }
</style>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-center">لوحة المعلمة</h1>

<!-- بيانات المعلمة -->
<div class="bg-white p-4 rounded shadow mb-6">
<h2 class="text-xl font-bold mb-2">بيانات المعلمة</h2>
<p>الاسم: <span id="teacherName"></span></p>
<p>المادة: <span id="teacherSubject"></span></p>
</div>

<!-- إضافة طالب -->
<div class="bg-white p-4 rounded shadow mb-6">
<h2 class="text-xl font-bold mb-3">إضافة طالب</h2>

<input id="studentName" placeholder="اسم الطالب" class="border p-2 w-full mb-2">
<input id="studentCode" placeholder="كود الطالب" class="border p-2 w-full mb-2">

<button onclick="addStudent()" class="bg-green-600 text-white px-4 py-2 rounded">
إضافة
</button>

<p id="msg" class="mt-2 text-red-600"></p>
</div>

<!-- الطلاب -->
<div class="bg-white p-4 rounded shadow mb-6">
<h2 class="text-xl font-bold mb-3">قائمة الطلاب</h2>

<table class="w-full border text-center">
<thead>
<tr class="bg-blue-900 text-white">
<th>الاسم</th>
<th>الكود</th>
<th>الدرجة</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>
</table>
</div>

<!-- إرسال النتائج -->
<div class="bg-white p-4 rounded shadow">
<button onclick="sendResults()" class="bg-blue-900 text-white px-4 py-2 rounded w-full">
إرسال النتائج للمديرة
</button>

<p id="sendMsg" class="mt-2"></p>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
authDomain: "interactive-book-37270.firebaseapp.com",
projectId: "interactive-book-37270"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const KG_ID = "talaea";

let teacherUid = null;
let teacherData = null;
let students = [];

// تحميل بيانات المعلمة
auth.onAuthStateChanged(async user => {
if (!user) {
location.href = "talaea-almobdeeen.html";
return;
}

teacherUid = user.uid;

const doc = await db.collection("users").doc(user.uid).get();
const data = doc.data();

teacherData = data;

document.getElementById("teacherName").innerText = data.name;
document.getElementById("teacherSubject").innerText = data.subject;

loadStudents();
});

// تحميل الطلاب
async function loadStudents() {
const snap = await db.collection("teacher_students")
.where("teacherUid","==",teacherUid)
.get();

students = [];

let html = "";

snap.forEach(doc=>{
let s = doc.data();
s.id = doc.id;
students.push(s);

html += `
<tr>
<td>${s.name}</td>
<td>${s.code}</td>
<td>
<input id="score_${s.id}" class="border w-20 p-1">
</td>
<td>
<button onclick="deleteStudent('${s.id}')" class="bg-red-500 text-white px-2">
حذف
</button>
</td>
</tr>
`;
});

document.getElementById("studentsTable").innerHTML = html;
}

// إضافة طالب
async function addStudent() {
let name = document.getElementById("studentName").value;
let code = document.getElementById("studentCode").value;

if (!name || !code) {
document.getElementById("msg").innerText = "املأ الحقول";
return;
}

await db.collection("teacher_students").add({
name,
code,
teacherUid,
kindergartenId: KG_ID,
subject: teacherData.subject
});

document.getElementById("msg").innerText = "تمت الإضافة";
loadStudents();
}

// حذف طالب
async function deleteStudent(id) {
await db.collection("teacher_students").doc(id).delete();
loadStudents();
}

// إرسال النتائج
async function sendResults() {
for (let s of students) {

let score = document.getElementById("score_"+s.id).value;

if (!score) continue;

await db.collection("pending_results").add({
studentName: s.name,
studentCode: s.code,
score,
teacherUid,
teacherName: teacherData.name,
kindergartenId: KG_ID,
status: "pending"
});
}

document.getElementById("sendMsg").innerText = "تم إرسال النتائج";
}
</script>

</body>
</html>
