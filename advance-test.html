<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تشخيص Firebase - متقدم</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; padding: 20px; direction: rtl; }
        input { display: block; margin: 10px auto; padding: 10px; width: 280px; }
        button { padding: 10px 30px; background: blue; color: white; border: none; cursor: pointer; margin-top: 10px; }
        .error { color: red; margin-top: 20px; padding: 10px; background: #ffeeee; border-radius: 5px; }
        .success { color: green; margin-top: 20px; padding: 10px; background: #eeffee; border-radius: 5px; }
        .info { color: blue; margin-top: 10px; }
        .box { border: 1px solid #ccc; margin: 20px auto; padding: 20px; max-width: 500px; border-radius: 10px; text-align: right; }
        pre { background: #f5f5f5; padding: 10px; text-align: left; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>

    <h2>🔬 تشخيص Firebase المتقدم</h2>
    <p>روضة طلائع المبدعين</p>
    
    <div class="box">
        <input type="email" id="email" placeholder="البريد الإلكتروني" value="admin2@gmail.com">
        <input type="password" id="password" placeholder="كلمة المرور" value="123456">
        <button onclick="testAll()">🔍 تشخيص كامل</button>
    </div>
    
    <div id="result"></div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCVmD5nCvSVsKtSWMFlelNFlFHXSv3LSi0",
            authDomain: "interactive-book-37270.firebaseapp.com",
            projectId: "interactive-book-37270",
            storageBucket: "interactive-book-37270.firebasestorage.app",
            messagingSenderId: "350364566140",
            appId: "1:350364566140:web:7997fb848a9b512f6b7ff9"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const KG_ID = "kg_talaea";
        
        const resultDiv = document.getElementById('result');
        
        function log(message, isError = false) {
            const div = document.createElement('div');
            div.innerHTML = message;
            div.className = isError ? 'error' : 'success';
            div.style.margin = '10px 0';
            div.style.padding = '8px';
            div.style.borderRadius = '5px';
            resultDiv.appendChild(div);
            resultDiv.scrollTop = resultDiv.scrollHeight;
        }
        
        async function testAll() {
            resultDiv.innerHTML = '';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            log("🚀 بدء التشخيص...", false);
            log("📧 البريد: " + email, false);
            log("🔑 كلمة المرور: " + "*".repeat(password.length), false);
            
            // ========== الاختبار 1: هل Firebase يعمل؟ ==========
            try {
                log("📡 الاختبار 1: التحقق من اتصال Firebase...", false);
                const testDoc = await db.collection("kindergartens").doc(KG_ID).get();
                log("✅ الاتصال بـ Firebase يعمل! تم العثور على الروضة: " + (testDoc.exists ? "نعم" : "لا"), false);
                if (testDoc.exists) {
                    log("📋 بيانات الروضة: " + JSON.stringify(testDoc.data(), null, 2), false);
                }
            } catch (e) {
                log("❌ فشل الاتصال بـ Firebase: " + e.message, true);
                return;
            }
            
            // ========== الاختبار 2: تسجيل الدخول ==========
            let userCred;
            try {
                log("🔐 الاختبار 2: محاولة تسجيل الدخول...", false);
                userCred = await auth.signInWithEmailAndPassword(email, password);
                log("✅ نجح تسجيل الدخول!", false);
                log("🆔 UID: " + userCred.user.uid, false);
            } catch (e) {
                log("❌ فشل تسجيل الدخول: " + e.message, true);
                log("📌 رمز الخطأ: " + (e.code || "غير معروف"), true);
                return;
            }
            
            // ========== الاختبار 3: قراءة نفس UID مباشرة ==========
            const uid = userCred.user.uid;
            log("📂 الاختبار 3: البحث عن وثيقة المستخدم في Firestore...", false);
            log("🔍 Document ID المستخدم: " + uid, false);
            
            try {
                const userDoc = await db.collection("users").doc(uid).get();
                if (userDoc.exists) {
                    log("✅ تم العثور على الوثيقة!", false);
                    log("📋 محتوى الوثيقة: " + JSON.stringify(userDoc.data(), null, 2), false);
                    
                    const data = userDoc.data();
                    
                    // التحقق من البيانات
                    if (data.role === "kindergarten_manager") {
                        log("👑 المستخدم مديرة!", false);
                    } else if (data.role === "teacher") {
                        log("👩‍🏫 المستخدم معلمة!", false);
                    } else {
                        log("⚠️ دور غير معروف: " + data.role, true);
                    }
                    
                    if (data.kindergartenId === KG_ID) {
                        log("✅ الروضة متطابقة: " + data.kindergartenId, false);
                    } else {
                        log("❌ الروضة غير متطابقة! المطلوب: " + KG_ID + " - الموجود: " + data.kindergartenId, true);
                    }
                    
                    if (data.isActive === true) {
                        log("✅ الحساب مفعل", false);
                    } else {
                        log("❌ الحساب غير مفعل", true);
                    }
                    
                } else {
                    log("❌ الوثيقة غير موجودة في Firestore!", true);
                    log("💡 الحل: أضف وثيقة في Collection 'users' بـ Document ID = " + uid, true);
                    log("💡 الحقول المطلوبة: uid, name, email, role, kindergartenId, isActive", true);
                }
            } catch (e) {
                log("❌ خطأ في قراءة Firestore: " + e.message, true);
                if (e.message.includes("permission")) {
                    log("🔒 هذا غالباً خطأ في Security Rules", true);
                }
            }
            
            // ========== الاختبار 4: محاولة قراءة جميع المستخدمين ==========
            try {
                log("📊 الاختبار 4: محاولة قراءة جميع المستخدمين...", false);
                const allUsers = await db.collection("users").get();
                log("✅ تم العثور على " + allUsers.size + " مستخدم/ين في Firestore", false);
                allUsers.forEach(doc => {
                    log("   - Document ID: " + doc.id + " → " + (doc.data().email || "بدون بريد"), false);
                });
            } catch (e) {
                log("⚠️ لا يمكن قراءة قائمة المستخدمين: " + e.message, true);
            }
            
            log("🏁 انتهى التشخيص", false);
        }
        
        // تشغيل التشخيص التلقائي عند تحميل الصفحة
        window.onload = function() {
            log("✅ صفحة التشخيص جاهزة", false);
            log("📌 KG_ID المستخدم: " + KG_ID, false);
        };
    </script>
</body>
</html>
